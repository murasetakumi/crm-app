<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;
  --tx:#111;--tx2:#888;--tx3:#ccc;
  --bd:#e8e8e4;
  --grn:#2d7a3a;--grnbg:#eaf5ec;--grnbr:#a8d8b0;
  --blu:#1a5fa0;--blubg:#e8f0fb;--blubr:#93baea;
  --amb:#8a5200;--ambbg:#fdf3e3;--ambbr:#e8b566;
  --pur:#5c44c2;--purbg:#f0eeff;--purbr:#b3a5e8;
  --red:#b03030;--redbg:#fdeaea;--redbr:#e8a0a0;
  --teal:#0e6b58;--tealbg:#e4f5f1;--tealbr:#7dcfbe;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg2);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:15px}
button{cursor:pointer}
a{color:var(--blu);text-decoration:none}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
.login-card{background:var(--bg);border-radius:var(--r);padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);color:var(--tx)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#aaa}
.field textarea{resize:vertical}
.btn{padding:13px;background:var(--tx);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:600;width:100%;cursor:pointer}
.btn:active{opacity:0.85}
.btn-ghost{padding:10px 16px;background:transparent;color:var(--tx);border:1px solid var(--bd);border-radius:var(--r2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:active{background:var(--bg2)}
.btn-red{padding:10px 16px;background:transparent;color:var(--red);border:1px solid var(--redbr);border-radius:var(--r2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.err{color:var(--red);font-size:13px;margin-top:8px}

#app-shell{display:flex;flex-direction:column;min-height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:52px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
#topbar-left{display:flex;align-items:center;gap:10px}
#topbar-title{font-size:16px;font-weight:600}
.role-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.role-admin{background:var(--redbg);color:var(--red)}
.role-director{background:var(--purbg);color:var(--pur)}
.role-editor{background:var(--blubg);color:var(--blu)}
.icon-btn{width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;border-radius:var(--r2)}
.icon-btn:active{background:var(--bg2)}

#bottom-nav{display:flex;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;color:var(--tx3);font-size:10px;gap:3px;border:none;background:none}
.bnav-item i{font-size:22px}
.bnav-item.active{color:var(--tx)}
.bnav-item span{font-weight:500}

#content{flex:1;padding:1rem;padding-bottom:80px;max-width:680px;margin:0 auto;width:100%}

#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:30}
#drawer-overlay.open{display:block}
#drawer{position:fixed;top:0;right:0;bottom:0;width:280px;background:var(--bg);z-index:40;transform:translateX(100%);transition:transform 0.25s;display:flex;flex-direction:column;padding:1.5rem}
#drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blubg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--blu);flex-shrink:0}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:1.5rem;width:100%;max-width:560px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 1.25rem}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--bd)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}

.type-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.25rem}
.type-btn{padding:16px;border:2px solid var(--bd);border-radius:var(--r2);cursor:pointer;background:var(--bg);text-align:center}
.type-btn:active{opacity:0.8}
.type-btn i{font-size:24px;display:block;margin-bottom:6px}
.type-btn .type-label{font-size:14px;font-weight:600}
.type-btn .type-desc{font-size:11px;opacity:0.7;margin-top:3px}

.check-group{display:flex;gap:8px;flex-wrap:wrap}
.check-item{padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r2);cursor:pointer;font-size:13px;background:var(--bg)}
.check-item.selected{border-color:var(--tx);background:var(--tx);color:#fff}

/* ===== DAY-LIST CALENDAR ===== */
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cal-nav-btn{background:none;border:1px solid var(--bd);border-radius:var(--r2);padding:7px 12px;cursor:pointer;color:var(--tx);font-size:13px;display:flex;align-items:center}
.cal-nav-btn:active{background:var(--bg2)}
.cal-month-title{font-size:16px;font-weight:600;flex:1;text-align:center}
.view-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.view-tab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bd);cursor:pointer;background:var(--bg);color:var(--tx2);white-space:nowrap;flex-shrink:0}
.view-tab.active{background:var(--tx);color:#fff;border-color:var(--tx)}

.day-row{display:flex;align-items:stretch;min-height:44px;border-bottom:1px solid var(--bd);background:var(--bg)}
.day-row:last-child{border-bottom:none}
.day-label-col{width:56px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border-right:1px solid var(--bd);background:var(--bg2)}
.day-label-col.today-col{background:var(--tx)}
.day-label-col.today-col .day-num,.day-label-col.today-col .day-name{color:#fff}
.day-num{font-size:16px;font-weight:700;line-height:1;color:var(--tx)}
.day-name{font-size:10px;color:var(--tx2);margin-top:2px}
.day-name.sun{color:var(--red)}
.day-name.sat{color:var(--blu)}
.day-num.sun{color:var(--red)}
.day-num.sat{color:var(--blu)}
.day-events-col{flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:4px;justify-content:center}
.day-empty{color:var(--tx3);font-size:12px;padding:2px 0}

/* Event chip */
.ev-chip{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:var(--r2);cursor:pointer;font-size:12px}
.ev-chip:active{opacity:0.8}
.ev-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:14px}
.ev-name{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Status badge (pill) on chip */
.ev-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;flex-shrink:0}
.badge-material{background:var(--ambbg);color:var(--amb);border:1px solid var(--ambbr)}
.badge-editing{background:var(--blubg);color:var(--blu);border:1px solid var(--blubr)}
.badge-submitted{background:var(--purbg);color:var(--pur);border:1px solid var(--purbr)}
.badge-posted{background:var(--grnbg);color:var(--grn);border:1px solid var(--grnbr)}
.badge-delivered{background:var(--tealbg);color:var(--teal);border:1px solid var(--tealbr)}
.badge-overdue{background:var(--redbg);color:var(--red);border:1px solid var(--redbr)}
.badge-urgent{background:#fff3cd;color:#7a5000;border:1px solid #e8b566}

/* chip background by status */
.chip-material{background:#fffbf5}
.chip-editing{background:#f5f9ff}
.chip-submitted{background:#f8f7ff}
.chip-posted{background:#f5fbf6}
.chip-delivered{background:#f2fbf8}
.chip-overdue{background:#fff5f5}
.chip-urgent{background:#fffdf0}

.bar-material{background:var(--amb)}
.bar-editing{background:var(--blu)}
.bar-submitted{background:var(--pur)}
.bar-posted{background:var(--grn)}
.bar-delivered{background:var(--teal)}
.bar-overdue{background:var(--red)}
.bar-urgent{background:#e08a00}

/* Status select in modal */
.ss-opt{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;border-bottom:1px solid var(--bd)}
.ss-opt:last-child{border-bottom:none}
.ss-opt:active{background:var(--bg2)}
.ss-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.alert{display:flex;align-items:flex-start;gap:8px;padding:12px;border-radius:var(--r2);margin-bottom:8px;font-size:13px;line-height:1.5}
.alert-warn{background:var(--ambbg);color:var(--amb)}
.alert-info{background:var(--blubg);color:var(--blu)}
.alert-ok{background:var(--grnbg);color:var(--grn)}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}

/* Overview */
.ov-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:8px;cursor:pointer}
.ov-card:active{background:var(--bg2)}
.ov-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.ov-name{font-weight:600;font-size:14px}
.ov-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.ov-status-col{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.ov-bottom{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.progress-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;flex:1;min-width:60px}
.progress-fill{height:100%;border-radius:3px;background:var(--grn)}
.progress-fill.warn{background:#e08a00}
.progress-fill.danger{background:var(--red)}
.ov-count{font-size:13px;font-weight:600;white-space:nowrap}
.contract-info{font-size:11px;color:var(--tx2);white-space:nowrap}
.status-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.st-ok{background:var(--grnbg);color:var(--grn)}
.st-warn{background:#fff3cd;color:#7a5000}
.st-danger{background:var(--redbg);color:var(--red)}
.st-gray{background:var(--bg3);color:var(--tx2)}

.section-label{font-size:12px;font-weight:600;color:var(--tx2);padding:8px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:8px}
.prow{background:var(--bg);border-radius:var(--r2);padding:14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--bd)}
.prow:active{background:var(--bg2)}
.prow-bar{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0}
.prow-body{flex:1;min-width:0}
.prow-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow-meta{font-size:12px;color:var(--tx2);margin-top:2px}

.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.lbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--r2);font-size:12px;background:var(--bg2);color:var(--tx2);border:1px solid var(--bd);text-decoration:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2);font-size:14px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:500;color:var(--tx2);padding:8px;border-bottom:1px solid var(--bd)}
td{padding:12px 8px;border-bottom:1px solid var(--bd);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
.quick-add-banner{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>

// statusKey → badge class
function getBadgeCls(v,cv){
  const s=v.status;
  if(s==='posted')return'badge-posted';
  if(s==='delivered')return'badge-delivered';
  const ref=cv==='edit'?v.editDueDate:cv==='submit'?v.clientSubmitDate:v.postDate;
  const d=daysUntil(ref);
  if(d!==null&&d<0)return'badge-overdue';
  if(d!==null&&d<=2)return'badge-urgent';
  if(s==='material_submitted')return'badge-material';
  if(s==='editing')return'badge-editing';
  if(s==='submitted_to_client')return'badge-submitted';
  return'badge-editing';
}
function getChipCls(v,cv){
  const b=getBadgeCls(v,cv);
  return b.replace('badge-','chip-');
}
function getBarCls(v,cv){
  const b=getBadgeCls(v,cv);
  return b.replace('badge-','bar-');
}

// Generate schedule: postDays is array like ['月','水','金'] or special '第2水,第4水,金'
// count = total videos to generate
function genSchedule(startDate, postDays, count){
  const dm={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const res=[];
  const cur=new Date(startDate);cur.setHours(0,0,0,0);
  let safety=0;
  while(res.length<count&&safety<3000){
    safety++;
    if(matchesPostDay(cur,postDays,dm)){
      const p=cur.toISOString().split('T')[0];
      res.push({postDate:p,clientSubmitDate:addDays(p,-3),editDueDate:addDays(p,-4)});
    }
    cur.setDate(cur.getDate()+1);
  }
  return res;
}

// Check if date matches postDays pattern
function matchesPostDay(date,postDays,dm){
  const dow=date.getDay();
  const dayOfMonth=date.getDate();
  const weekOfMonth=Math.ceil(dayOfMonth/7); // 1-5
  for(const pd of postDays){
    // Special patterns: 第N曜
    const m=pd.match(/^第(\d)(.+)$/);
    if(m){
      const nth=parseInt(m[1]);
      const dayName=m[2];
      const dayNum=dm[dayName];
      if(dayNum===undefined)continue;
      if(dow===dayNum&&weekOfMonth===nth)return true;
    } else {
      // Regular day
      const dayNum=dm[pd];
      if(dayNum!==undefined&&dow===dayNum)return true;
    }
  }
  return false;
}

function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}

// Convert postDays string like "水,金" or "第2水,第4水,金" to array
function parseDays(str){
  if(!str)return[];
  return str.split(',').map(s=>s.trim()).filter(Boolean);
}

// Contract completion helpers
function getContractTotal(c){
  if(!c.contractMonths||!c.monthlyCount)return null;
  return c.contractMonths*c.monthlyCount;
}
function getContractEndMonth(c){
  if(!c.contractStart||!c.contractMonths)return null;
  const d=new Date(c.contractStart);
  d.setMonth(d.getMonth()+c.contractMonths);
  return`${d.getFullYear()}年${d.getMonth()+1}月`;
}
function getPostedCount(clientId){
  return db.videos.filter(v=>v.clientId===clientId&&(v.status==='posted'||v.status==='delivered')).length;
}

function gid(){return'i'+Math.random().toString(36).substr(2,8);}

function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function fmt(d){if(!d)return'-';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;}
function viewDate(v){

function navigate(page){
  PAGE=page;

  document.getElementById('topbar-title').textContent=titles[page]||'';

  const bn=document.getElementById('bnav-'+page);if(bn)bn.classList.add('active');
  const fns={calendar:renderCalendar,overview:renderOverview,prospects:renderProspects,members:renderMembers};
  if(fns[page])document.getElementById('content').innerHTML=fns[page]();
  if(page==='calendar'){
    requestAnimationFrame(()=>{
      const todayCol=document.querySelector('.today-col');
      if(todayCol){
        const row=todayCol.closest('.day-row');
        if(row){
          const content=document.getElementById('content');
          const scrollTo=row.offsetTop-(window.innerHeight/2)+(row.clientHeight/2);
          content.scrollTo({top:Math.max(0,scrollTo),behavior:'auto'});
        }
      }
    });
  }
}

function regenerateFutureVideos(clientId,newPostDays){
  const c=getClient(clientId);if(!c)return;
  const todayStr=new Date().toISOString().split('T')[0];
  const kept=db.videos.filter(v=>v.clientId===clientId&&(v.status==='posted'||v.status==='delivered'));
  const maxNoNum=kept.filter(v=>!isNaN(Number(v.videoNo))).map(v=>Number(v.videoNo));
  const startNo=maxNoNum.length?Math.max(...maxNoNum)+1:1;
  const months=c.contractMonths||3;
  const count=Math.max(months*c.monthlyCount,c.monthlyCount*3);
  const schedules=genSchedule(todayStr,newPostDays,count);
  db.videos=db.videos.filter(v=>v.clientId!==clientId||(v.status==='posted'||v.status==='delivered'));
  schedules.forEach((s,i)=>{
    db.videos.push({id:gid(),clientId,videoNo:String(startNo+i),status:'material_submitted',
      editDueDate:s.editDueDate,clientSubmitDate:s.clientSubmitDate,postDate:s.postDate,editorId:c.memberIds.editor||''});
  });
}

function renderCalendar(){
  const y=CALY,m=CALM;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];
  const videos=visVids();

  const alerts=[];
  videos.filter(v=>v.status!=='posted'&&v.status!=='delivered').forEach(v=>{
    const c=getClient(v.clientId);const cn=c?c.name:'不明';
    const ed=daysUntil(v.editDueDate);const sd=daysUntil(v.clientSubmitDate);const pd2=daysUntil(v.postDate);
    if((isAdmin()||isEditor())&&ed!==null&&ed>=0&&ed<=2&&v.status==='material_submitted')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — 編集完了まであと${ed}日`});
    if((isAdmin()||isDir())&&sd!==null&&sd>=0&&sd<=1&&v.status==='editing')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — お客様提出まであと${sd}日`});
    if((isAdmin()||isDir())&&pd2===0&&v.status==='submitted_to_client')
      alerts.push({type:'info',msg:`${cn} No.${v.videoNo} — 本日が投稿日です`});
  });
  const alertHtml=alerts.length
    ?`<div style="margin-bottom:10px">${alerts.map(a=>`<div class="alert alert-${a.type}"><i class="ti ti-bell"></i><span>${a.msg}</span></div>`).join('')}</div>`
    :`<div class="alert alert-ok" style="margin-bottom:10px"><i class="ti ti-check"></i><span>本日のリマインドはありません</span></div>`;

  const byDate={};
  videos.forEach(v=>{
    const d=viewDate(v);if(!d)return;
    if(d.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)){
      if(!byDate[d])byDate[d]=[];byDate[d].push(v);
    }
  });

  const tabsHtml=isAdmin()
    ?`<div class="view-tabs"><button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button><button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button><button class="view-tab ${CALVIEW==='edit'?'active':''}" onclick="setCalView('edit')">編集完了日</button></div>`
    :isDir()?`<div class="view-tabs"><button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button><button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button></div>`:'';

  let dayRows='';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=new Date(ds);const dow=dt.getDay();
    const isToday=ds===todayStr;
    const dayVids=byDate[ds]||[];
    const chips=dayVids.map(v=>{
      const c=getClient(v.clientId);
      const chipCls=getChipCls(v,CALVIEW);
      const barCls=getBarCls(v,CALVIEW);
      const badgeCls=getBadgeCls(v,CALVIEW);
      return`<div class="ev-chip ${chipCls}" onclick="showVideoModal('${v.id}')">
        <div class="ev-bar ${barCls}"></div>
        <div class="ev-name">${c?.name||'?'} No.${v.videoNo}</div>
        <span class="ev-badge ${badgeCls}">${(c&&!c.postingIncluded&&(v.status==='posted'||v.status==='delivered'))?'納品済':SM[v.status]}</span>
      </div>`;
    }).join('');
    dayRows+=`<div class="day-row" id="day-${ds}">
      <div class="day-label-col${isToday?' today-col':''}">
        <div class="day-num${!isToday&&dow===0?' sun':!isToday&&dow===6?' sat':''}">${d}</div>
        <div class="day-name${dow===0?' sun':dow===6?' sat':''}">${DAYS[dow]}</div>
      </div>
      <div class="day-events-col">${chips||'<div class="day-empty">—</div>'}</div>
    </div>`;
  }

  const quickBtn=isAdmin()||isDir()?`<div class="quick-add-banner">
    <div><div style="font-weight:600;font-size:14px">案件を追加</div><div style="font-size:12px;color:var(--tx2);margin-top:2px">投稿日から自動でスケジュール生成</div></div>
    <button class="btn-ghost" onclick="showAddModal()"><i class="ti ti-plus"></i>追加</button>
  </div>`:'';

  return`${alertHtml}${quickBtn}
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-month-title">${y}年 ${MONTHS[m]}</div>
      <button class="cal-nav-btn" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      <button class="cal-nav-btn" onclick="goToday()" style="font-size:12px">今月</button>
    </div>
    ${tabsHtml}
    <div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden">${dayRows}</div>`;
}

function nextMonth(){if(CALM===11){CALM=0;CALY++;}else{CALM++;}navigate('calendar');}

function toggleDay(el,day){
  if(!window._selDays)window._selDays=[];
  if(window._selDays.includes(day)){window._selDays=window._selDays.filter(d=>d!==day);el.classList.remove('selected');}
  else{window._selDays.push(day);el.classList.add('selected');}
}
function togglePlat(el,p){
  if(!window._selPlat)window._selPlat=[];
  if(window._selPlat.includes(p)){window._selPlat=window._selPlat.filter(x=>x!==p);el.classList.remove('selected');}
  else{window._selPlat.push(p);el.classList.add('selected');}
}
function setPosting(val,pre){
  window._posting=val;
  document.getElementById(pre+'-py')?.classList.toggle('selected',val);
  document.getElementById(pre+'-pn')?.classList.toggle('selected',!val);
}

function saveSubscription(){
  const clientId=document.getElementById('sf-c').value;
  const cnt=parseInt(document.getElementById('sf-cnt').value)||8;
  const mo=parseInt(document.getElementById('sf-mo').value)||12;
  const startDate=document.getElementById('sf-st').value;
  const startNo=document.getElementById('sf-no').value.trim()||'1';
  const days=window._selDays||[];
  const editorId=document.getElementById('sf-ed').value;
  if(!clientId){alert('クライアントを選択してください');return;}
  if(!days.length){alert('投稿曜日を選択してください');return;}
  const c=getClient(clientId);
  if(c){c.planType='subscription';c.monthlyCount=cnt;c.contractMonths=mo;c.postDays=days;c.contractStart=startDate;c.platforms=window._selPlat||[];c.postingIncluded=window._posting!==false;if(editorId)c.memberIds.editor=editorId;}
  const total=cnt*mo;
  const schedules=genSchedule(startDate,days,total);
  const startNoNum=isNaN(Number(startNo))?0:Number(startNo)-1;
  schedules.forEach((s,i)=>{
    const no=isNaN(Number(startNo))?String.fromCharCode(65+i):String(startNoNum+1+i);
    db.videos.push({id:gid(),clientId,videoNo:no,status:'material_submitted',
      editDueDate:s.editDueDate,clientSubmitDate:s.clientSubmitDate,postDate:s.postDate,editorId});
  });
  const pd=new Date(startDate);CALY=pd.getFullYear();CALM=pd.getMonth();
  saveDB();closeModal();navigate('calendar');
}

function saveSpot(){
  const clientId=document.getElementById('sp-c').value;
  const postDate=document.getElementById('sp-p').value;
  const no=document.getElementById('sp-no').value.trim()||'1';
  if(!clientId||!postDate){alert('クライアントと投稿日を入力してください');return;}
  const c=getClient(clientId);
  if(c){c.planType='spot';c.platforms=window._selPlat||[];c.postingIncluded=window._posting!==false;}
  db.videos.push({id:gid(),clientId,videoNo:no,status:'material_submitted',
    editDueDate:addDays(postDate,-4),clientSubmitDate:addDays(postDate,-3),postDate,
    editorId:document.getElementById('sp-ed').value});
  const pd=new Date(postDate);CALY=pd.getFullYear();CALM=pd.getMonth();
  saveDB();closeModal();navigate('calendar');
}

function renderOverview(){
  const today=new Date().toISOString().split('T')[0];
  const ym=today.substr(0,7);
  const tabs=`<div class="view-tabs" style="margin-bottom:1rem">
    <button class="view-tab ${OV_TAB==='subscription'?'active':''}" onclick="setOvTab('subscription')">🔄 サブスク</button>
    <button class="view-tab ${OV_TAB==='spot'?'active':''}" onclick="setOvTab('spot')">⚡ 単発</button>
    ${isAdmin()?`<button class="view-tab ${OV_TAB==='info'?'active':''}" onclick="setOvTab('info')">📋 基本情報</button>`:''}
  </div>`;
  if(OV_TAB==='info')return`<div style="font-size:18px;font-weight:700;margin-bottom:1rem">管理</div>${tabs}`+renderClientInfo();
  const activeClients=db.clients.filter(c=>c.status==='active'&&c.planType===OV_TAB);
  if(!activeClients.length)return`<div style="font-size:18px;font-weight:700;margin-bottom:1rem">管理</div>${tabs}<div class="empty">該当するクライアントがいません</div>`;

  const cards=activeClients.map(c=>{
    const vids=db.videos.filter(v=>v.clientId===c.id);
    const thisMonth=vids.filter(v=>v.postDate&&v.postDate.startsWith(ym));
    const postedCount=thisMonth.filter(v=>v.status==='posted'||v.status==='delivered').length;
    const total=c.monthlyCount||thisMonth.length||0;
    const totalContract=getContractTotal(c);
    const postedTotal=getPostedCount(c.id);
    const remaining=totalContract?totalContract-postedTotal:null;
    const endMonth=getContractEndMonth(c);
    const upcoming=vids.filter(v=>v.status!=='posted'&&v.status!=='delivered').sort((a,b)=>(a.postDate||'').localeCompare(b.postDate||''))[0];
    const pct=total>0?Math.round(postedCount/total*100):0;
    const editor=getUser(c.memberIds?.editor);

    // 遅延: お客様提出日を過ぎても提出されていない
    const delayVids=vids.filter(v=>v.status!=='posted'&&v.status!=='delivered'&&v.status!=='submitted_to_client'&&v.clientSubmitDate&&daysUntil(v.clientSubmitDate)<0);
    // 警告: 投稿日を過ぎても投稿されていない
    const warnVids=vids.filter(v=>v.status!=='posted'&&v.status!=='delivered'&&v.postDate&&daysUntil(v.postDate)<0);
    const noVideos=vids.length===0;

    let statusTags='';
    if(noVideos){statusTags=`<span class="status-tag st-gray">未登録</span>`;}
    else{
      if(delayVids.length)statusTags+=`<span class="status-tag st-danger">🔴 ${delayVids.length}本遅延 ${delayVids.map(v=>`No.${v.videoNo}`).join(',')}</span> `;
      if(warnVids.length)statusTags+=`<span class="status-tag st-warn">🟡 ${warnVids.length}本未投稿 ${warnVids.map(v=>`No.${v.videoNo}`).join(',')}</span>`;
      if(!delayVids.length&&!warnVids.length)statusTags=`<span class="status-tag st-ok">🟢 順調</span>`;
    }

    const fillCls=delayVids.length?'danger':warnVids.length?'warn':'';
    const dotColor=noVideos?'var(--tx3)':delayVids.length?'var(--red)':warnVids.length?'var(--amb)':'var(--grn)';

    return`<div class="ov-card" onclick="showClientOverview('${c.id}')">
      <div class="ov-top">
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
            <div class="ov-name">${c.name}</div>
          </div>
          <div class="ov-sub">${c.postDays?.join('・')||'-'} · 月${c.monthlyCount}本</div>
        </div>
        <div class="ov-status-col">${statusTags}</div>
      </div>
      <div class="ov-bottom">
        <div class="ov-count">${postedCount}/${total}本</div>
        <div class="progress-bar"><div class="progress-fill ${fillCls}" style="width:${pct}%"></div></div>
        ${totalContract
          ?`<div class="contract-info"><strong>No.1〜No.${totalContract}</strong>（${c.contractMonths}ヶ月×${c.monthlyCount}本）· 残り${Math.max(0,remaining)}本 · ${endMonth||''}終了</div>`
          :`<div style="margin-top:4px;padding:5px 8px;background:var(--redbg);border:1px solid var(--redbr);border-radius:var(--r2);font-size:11px;font-weight:600;color:var(--red)">⚠️ 契約期間未設定 — 管理画面で設定してください</div>`}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--tx2)">
        <span>次の投稿: ${upcoming?fmt(upcoming.postDate):'-'}</span>
        <span>編集: ${editor?.name||'-'}</span>
      </div>
    </div>`;
  }).join('');

  return`<div style="font-size:18px;font-weight:700;margin-bottom:1rem">管理</div>${tabs}${cards}
    <p style="font-size:11px;color:var(--tx2);margin-top:8px;text-align:center">タップで詳細を表示</p>`;
}

    if(search&&!c.name.toLowerCase().includes(search)&&!(c.contactName||'').toLowerCase().includes(search)&&!(c.industry||'').toLowerCase().includes(search))return false;
    return true;
  });
  const groups=[{key:'negotiating',label:'商談中',color:'var(--amb)'},{key:'consulting',label:'ご相談',color:'var(--blu)'},{key:'ended',label:'契約終了',color:'var(--tx2)'},{key:'lost',label:'失注',color:'var(--red)'}];
  const addBtn=isAdmin()?`<button class="btn-ghost" onclick="showAddClientModal()"><i class="ti ti-plus"></i>追加</button>`:'';
  const filterHtml=`<div style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px">
    ${[{v:'',l:'すべて'},{v:'negotiating',l:'商談中'},{v:'consulting',l:'ご相談'},{v:'ended',l:'終了'},{v:'lost',l:'失注'}].map(o=>`<button class="view-tab ${PF===o.v?'active':''}" onclick="setPF('${o.v}')">${o.l}</button>`).join('')}
  </div>`;
  const searchHtml=`<input type="text" placeholder="名前・業種で検索..." value="${PS}" oninput="setPS(this.value)" style="width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);font-size:14px;margin-bottom:12px">`;
  const groupsHtml=groups.map(g=>{
    const items=nonActive.filter(c=>c.status===g.key);
    if(!items.length)return'';
    return`<div style="margin-bottom:1.25rem">
      <div class="section-label"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${g.color};display:inline-block"></span>${g.label} <span style="font-weight:400">${items.length}件</span></span></div>
      ${items.map(c=>{const dir=getUser(c.memberIds?.director);return`<div class="prow" onclick="showProspectModal('${c.id}')"><div class="prow-bar" style="background:${g.color}"></div><div class="prow-body"><div class="prow-name">${c.name}</div><div class="prow-meta">${c.contactName||''}${c.industry?' · '+c.industry:''}</div></div>${dir?`<div style="font-size:12px;color:var(--tx2);flex-shrink:0">${dir.name}</div>`:''}</div>`;}).join('')}
    </div>`;
  }).join('')||'<div class="empty">該当する顧客がいません</div>';
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-size:18px;font-weight:700">見込み顧客</span>${addBtn}</div>
    ${filterHtml}${searchHtml}${groupsHtml}`;
}

function setPS(v){PS=v;navigate('prospects');}
function setPF(v){PF=v;navigate('prospects');}

function showProspectModal(clientId){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const dir=getUser(c.memberIds?.director);
  const scolor={negotiating:'var(--amb)',consulting:'var(--blu)',ended:'var(--tx2)',lost:'var(--red)',active:'var(--grn)'};
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div><div style="font-size:18px;font-weight:700">${c.name}</div><div style="font-size:14px;color:var(--tx2);margin-top:2px">${c.contactName||''}</div></div>
      <span class="pill" style="background:${scolor[c.status]}22;color:${scolor[c.status]}">${CSM[c.status]||c.status}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px;margin-bottom:16px">
      <div><div style="font-size:11px;color:var(--tx2);margin-bottom:3px">業種</div><div style="font-weight:500">${c.industry||'-'}</div></div>
      <div><div style="font-size:11px;color:var(--tx2);margin-bottom:3px">施策</div><div style="font-weight:500">${c.serviceType||'-'}</div></div>
      <div><div style="font-size:11px;color:var(--tx2);margin-bottom:3px">紹介者</div><div style="font-weight:500">${c.referrer||'-'}</div></div>
      <div><div style="font-size:11px;color:var(--tx2);margin-bottom:3px">担当</div><div style="font-weight:500">${dir?.name||'-'}</div></div>
    </div>
    ${c.goal?`<div style="padding:12px;background:var(--bg2);border-radius:var(--r2);font-size:14px;margin-bottom:10px"><div style="font-size:11px;color:var(--tx2);margin-bottom:4px">目標・課題</div>${c.goal}</div>`:''}
    ${c.memo?`<div style="padding:12px;background:var(--bg2);border-radius:var(--r2);font-size:14px;margin-bottom:10px"><div style="font-size:11px;color:var(--tx2);margin-bottom:4px">備考</div>${c.memo}</div>`:''}
    <div class="modal-footer">
      ${isAdmin()?`<button class="btn-red" onclick="deleteClient('${c.id}')"><i class="ti ti-trash"></i>削除</button>`:''}
      ${isAdmin()?`<button class="btn-ghost" onclick="closeModal();showEditProspectModal('${c.id}')"><i class="ti ti-edit"></i>編集</button>`:''}
      <button class="btn-ghost" onclick="closeModal()">閉じる</button>
    </div>
  </div>`);
}

function deleteClient(clientId){
  if(!confirm('このクライアントを完全に削除しますか？'))return;
  db.clients=db.clients.filter(c=>c.id!==clientId);
  db.videos=db.videos.filter(v=>v.clientId!==clientId);
  saveDB();closeModal();navigate('prospects');
}

function showEditProspectModal(clientId){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const uopts=db.users.filter(u=>u.isActive).map(u=>`<option value="${u.id}" ${c.memberIds?.director===u.id?'selected':''}>${u.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>${c.name} の編集</h2>
    <div class="form-grid">
      <div class="full field"><label>ステータス</label><select id="ep-s"><option value="active" ${c.status==='active'?'selected':''}>契約中</option><option value="negotiating" ${c.status==='negotiating'?'selected':''}>商談中</option><option value="consulting" ${c.status==='consulting'?'selected':''}>ご相談</option><option value="ended" ${c.status==='ended'?'selected':''}>契約終了</option><option value="lost" ${c.status==='lost'?'selected':''}>失注</option></select></div>
      <div class="full field"><label>担当者</label><select id="ep-d"><option value="">-</option>${uopts}</select></div>
      <div class="full field"><label>施策内容</label><input id="ep-sv" value="${c.serviceType||''}"></div>
      <div class="full field"><label>目標・課題</label><textarea id="ep-g" rows="3">${c.goal||''}</textarea></div>
      <div class="full field"><label>備考</label><textarea id="ep-m" rows="2">${c.memo||''}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveEditProspect('${clientId}')">保存</button>
    </div>
  </div>`);
}

function saveEditProspect(id){
  const c=db.clients.find(x=>x.id===id);if(!c)return;
  c.status=document.getElementById('ep-s').value;c.memberIds.director=document.getElementById('ep-d').value;
  c.serviceType=document.getElementById('ep-sv').value.trim();c.goal=document.getElementById('ep-g').value.trim();c.memo=document.getElementById('ep-m').value.trim();
  saveDB();closeModal();navigate('prospects');
}

/* ====== MEMBERS ====== */
function renderMembers(){
  const rows=db.users.map(u=>`<tr><td style="font-weight:500">${u.name}</td><td style="font-size:12px;color:var(--tx2)">${u.email}</td><td><button class="btn-ghost" style="padding:6px 10px;font-size:12px" onclick="showEditMemberModal('${u.id}')"><i class="ti ti-edit"></i></button></td></tr>`).join('');
  return`<div style="font-size:18px;font-weight:700;margin-bottom:1rem">メンバー管理</div>
    <div style="background:var(--bg);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;margin-bottom:1rem">
      <table><thead><tr><th>名前</th><th>メール</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>
    <button class="btn-ghost" onclick="showAddMemberModal()" style="width:100%;justify-content:center"><i class="ti ti-plus"></i>メンバー追加</button>`;
}

function showAddClientModal(){
  const uopts=db.users.filter(u=>u.isActive).map(u=>`<option value="${u.id}">${u.name}</option>`).join('');
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>クライアント追加</h2>
    <div class="form-grid">
      <div class="full field"><label>クライアント名 *</label><input id="nc-n" placeholder="株式会社〇〇"></div>
      <div class="field"><label>担当者名</label><input id="nc-c" placeholder="山田さん"></div>
      <div class="field"><label>業種</label><input id="nc-i" placeholder="建設業"></div>
      <div class="field"><label>ステータス</label><select id="nc-st"><option value="consulting">ご相談</option><option value="negotiating">商談中</option><option value="active">契約中</option></select></div>
      <div class="field"><label>紹介者</label><input id="nc-r" placeholder="直接 / 〇〇さん"></div>
      <div class="full field"><label>担当ディレクター</label><select id="nc-dir"><option value="">-</option>${uopts}</select></div>
      <div class="full field"><label>目標・課題</label><textarea id="nc-g" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveNewClient()">登録</button>
    </div>
  </div>`);
}

function saveNewClient(){
  const name=document.getElementById('nc-n').value.trim();if(!name){alert('クライアント名を入力してください');return;}
  const nc={id:gid(),name,contactName:document.getElementById('nc-c').value.trim(),industry:document.getElementById('nc-i').value.trim(),planType:'subscription',serviceType:'',platforms:[],postingIncluded:true,referrer:document.getElementById('nc-r').value.trim(),status:document.getElementById('nc-st').value,contractStart:'',contractMonths:0,monthlyCount:0,postDays:[],goal:document.getElementById('nc-g').value.trim(),memo:'',contractAmount:0,memberIds:{director:document.getElementById('nc-dir').value,editor:''},links:{drive:'',gemini:''}};
  db.clients.push(nc);saveDB();closeModal();navigate('prospects');
}

function showAddMemberModal(){
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>メンバー追加</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="nm-n" placeholder="山田 太郎"></div>
      <div class="field"><label>権限</label><select id="nm-r"><option value="editor">編集者</option><option value="director">ディレクター</option><option value="admin">経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="nm-e"></div>
      <div class="full field"><label>パスワード</label><input type="password" id="nm-p"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveNewMember()">追加</button>
    </div>
  </div>`);
}

function saveNewMember(){
  const name=document.getElementById('nm-n').value.trim();const email=document.getElementById('nm-e').value.trim();const pass=document.getElementById('nm-p').value;
  if(!name||!email||!pass){alert('すべて入力してください');return;}
  if(db.users.find(u=>u.email===email)){alert('このメールアドレスは使用済みです');return;}
  db.users.push({id:gid(),name,email,password:pass,role:document.getElementById('nm-r').value,isActive:true});
  saveDB();closeModal();navigate('members');
}

function showEditMemberModal(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>${u.name} の編集</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="em-n" value="${u.name}"></div>
      <div class="field"><label>権限</label><select id="em-r"><option value="editor" ${u.role==='editor'?'selected':''}>編集者</option><option value="director" ${u.role==='director'?'selected':''}>ディレクター</option><option value="admin" ${u.role==='admin'?'selected':''}>経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="em-e" value="${u.email}"></div>
      <div class="full field"><label>新しいパスワード（変更時のみ）</label><input type="password" id="em-p"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveEditMember('${userId}')">保存</button>
    </div>
  </div>`);
}

function saveEditMember(id){
  const u=db.users.find(x=>x.id===id);if(!u)return;
  u.name=document.getElementById('em-n').value.trim()||u.name;u.email=document.getElementById('em-e').value.trim()||u.email;
  u.role=document.getElementById('em-r').value;const np=document.getElementById('em-p').value;if(np)u.password=np;
  saveDB();closeModal();navigate('members');
}

function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="closeModalOnOverlay(event)">${html}</div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function closeModalOnOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

loadDB();
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
