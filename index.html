<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM - 映像制作・SNS管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f0;
  --color-background-tertiary: #eeede8;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666660;
  --color-border-tertiary: rgba(0,0,0,0.12);
  --color-border-secondary: rgba(0,0,0,0.2);
  --color-text-danger: #a32d2d;
  --color-text-success: #3b6d11;
  --color-text-info: #185fa5;
  --color-background-info: #e6f1fb;
  --color-background-secondary-info: #e6f1fb;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);background:var(--color-background-tertiary);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:var(--font-sans);font-size:14px}
button{cursor:pointer}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-background-tertiary)}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:2rem;width:360px}
.login-card h1{font-size:20px;font-weight:500;margin-bottom:0.25rem}
.login-card p{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-primary{width:100%;padding:9px;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer}
.btn-primary:hover{opacity:0.85}
.btn-secondary{padding:7px 14px;background:transparent;color:var(--color-text-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer}
.btn-secondary:hover{background:var(--color-background-secondary)}
.btn-danger{padding:7px 14px;background:transparent;color:var(--color-text-danger);border:0.5px solid #f09595;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer}
.error-msg{color:var(--color-text-danger);font-size:12px;margin-top:8px}

#main-layout{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10}
#content{margin-left:220px;flex:1;padding:1.5rem;min-height:100vh}

.sidebar-header{padding:1.25rem 1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.sidebar-header h2{font-size:15px;font-weight:500}
.sidebar-header p{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.sidebar-nav{flex:1;padding:0.75rem 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 1rem;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-left:2px solid transparent}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{color:var(--color-text-primary);border-left-color:var(--color-text-primary);background:var(--color-background-secondary);font-weight:500}
.nav-item i{font-size:16px}
.sidebar-footer{padding:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--color-text-info);flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-role{font-size:11px;color:var(--color-text-secondary)}

.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.page-header h1{font-size:20px;font-weight:500}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:500}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-active{background:#EAF3DE;color:#3B6D11}
.badge-negotiating{background:#FAEEDA;color:#854F0B}
.badge-consulting{background:#E6F1FB;color:#185FA5}
.badge-ended{background:#F1EFE8;color:#5F5E5A}
.badge-lost{background:#FCEBEB;color:#A32D2D}
.badge-material{background:#FAEEDA;color:#854F0B}
.badge-editing{background:#E6F1FB;color:#185FA5}
.badge-submitted{background:#EEEDFE;color:#534AB7}
.badge-posted{background:#EAF3DE;color:#3B6D11}
.badge-admin{background:#FCEBEB;color:#A32D2D}
.badge-director{background:#EEEDFE;color:#534AB7}
.badge-editor{background:#E6F1FB;color:#185FA5}

.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:1.5rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:500;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}

.cal-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.cal-item:last-child{border-bottom:none}
.cal-date{width:90px;font-size:12px;color:var(--color-text-secondary);flex-shrink:0}
.cal-no{width:50px;font-weight:500;flex-shrink:0}
.cal-client{flex:1;font-weight:500}
.cal-editor{width:80px;font-size:12px;color:var(--color-text-secondary)}
.cal-status{width:120px}

.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:8px;font-size:13px}
.alert-warn{background:#FAEEDA;color:#854F0B;border:0.5px solid #FAC775}
.alert-info{background:#E6F1FB;color:#185FA5;border:0.5px solid #B5D4F4}
.alert i{font-size:16px;margin-top:1px;flex-shrink:0}

.status-select{padding:4px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:12px}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;margin-top:1.25rem}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
</style>
</head>

let state = {currentUser:null,currentPage:'dashboard'};
let db = {};

function loadDB(){const s=localStorage.getItem('crm_db');if(s){db=JSON.parse(s);}else{db=JSON.parse(JSON.stringify(DEFAULT_DATA));saveDB();}}
function saveDB(){localStorage.setItem('crm_db',JSON.stringify(db));}
function genId(){return 'id_'+Math.random().toString(36).substr(2,9);}

function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const user=db.users.find(u=>u.email===email&&u.password===password&&u.isActive);
  if(!user){const el=document.getElementById('login-error');el.textContent='メールアドレスまたはパスワードが違います';el.classList.remove('hidden');return;}
  state.currentUser=user;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-layout').classList.remove('hidden');
  renderSidebar();navigate('dashboard');
}

function doLogout(){
  state.currentUser=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('main-layout').classList.add('hidden');
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
}

function isAdmin(){return state.currentUser?.role==='admin';}
function isDirector(){return state.currentUser?.role==='director';}
function isEditor(){return state.currentUser?.role==='editor';}
function canSeeContracts(){return isAdmin();}

function renderSidebar(){
  const u=state.currentUser;
  document.getElementById('sidebar-avatar').textContent=u.name.charAt(0);
  document.getElementById('sidebar-name').textContent=u.name;
  const roleMap={admin:'経営層',director:'ディレクター',editor:'編集者'};
  document.getElementById('sidebar-role').textContent=roleMap[u.role];
  const pages=[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'ダッシュボード',roles:['admin','director','editor']},

  nav.innerHTML=pages.filter(p=>p.roles.includes(u.role)).map(p=>`<div class="nav-item ${state.currentPage===p.id?'active':''}" onclick="navigate('${p.id}')"><i class="ti ${p.icon}"></i>${p.label}</div>`).join('');
}

function navigate(page){
  state.currentPage=page;renderSidebar();
  const content=document.getElementById('content');
  const pages={dashboard:renderDashboard,calendar:renderCalendar,clients:renderClients,videos:renderVideos,members:renderMembers};
  if(pages[page])content.innerHTML=pages[page]();
}

function getClient(id){return db.clients.find(c=>c.id===id)||null;}

function fmtDate(d){
  if(!d)return '-';
  const dt=new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;
}

function visibleClients(){
  if(isAdmin()||isDirector())return db.clients;
  return db.clients.filter(c=>c.memberIds.editor===state.currentUser.id||c.memberIds.director===state.currentUser.id);
}

function visibleVideos(){
  if(isAdmin()||isDirector())return db.videos;
  return db.videos.filter(v=>v.editorId===state.currentUser.id);
}

function getDaysUntil(dateStr){
  if(!dateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr);d.setHours(0,0,0,0);
  return Math.round((d-today)/86400000);
}

function generateSchedule(startDate,postDaysOfWeek,count){
  const dayMap={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const targetDays=postDaysOfWeek.map(d=>dayMap[d]).filter(d=>d!==undefined);
  if(!targetDays.length)return[];
  const result=[];
  const cur=new Date(startDate||new Date());cur.setHours(0,0,0,0);
  while(result.length<count){
    if(targetDays.includes(cur.getDay())){
      const postDate=new Date(cur);
      const clientSubmit=new Date(cur);clientSubmit.setDate(clientSubmit.getDate()-2);
      const editDue=new Date(cur);editDue.setDate(editDue.getDate()-4);
      const shoot=new Date(cur);shoot.setDate(shoot.getDate()-7);
      result.push({postDate:postDate.toISOString().split('T')[0],clientSubmitDate:clientSubmit.toISOString().split('T')[0],editDueDate:editDue.toISOString().split('T')[0],shootDate:shoot.toISOString().split('T')[0]});
    }
    cur.setDate(cur.getDate()+1);
  }
  return result;
}

    const cname=c?c.name:'不明';
    const editDays=getDaysUntil(v.editDueDate);
    const submitDays=getDaysUntil(v.clientSubmitDate);
    const postDays2=getDaysUntil(v.postDate);
    if((isAdmin()||isEditor())&&editDays!==null&&editDays>=0&&editDays<=2&&v.status==='material_submitted'){
      alerts.push({type:'warn',msg:`【編集完了リマインド】${cname} No.${v.videoNo} — 編集完了日まであと${editDays}日（${fmtDate(v.editDueDate)}）`});
    }
    if((isAdmin()||isDirector())&&submitDays!==null&&submitDays>=0&&submitDays<=1&&v.status==='editing'){
      alerts.push({type:'warn',msg:`【お客様提出リマインド】${cname} No.${v.videoNo} — 提出日まであと${submitDays}日（${fmtDate(v.clientSubmitDate)}）`});
    }
    if((isAdmin()||isDirector())&&postDays2!==null&&postDays2===0&&v.status==='submitted_to_client'){
      alerts.push({type:'info',msg:`【本日投稿】${cname} No.${v.videoNo} — 本日が投稿日です`});
    }
  });
  return alerts;
}

function saveNewClient(){
  const name=document.getElementById('nc-name').value.trim();
  if(!name){alert('クライアント名を入力してください');return;}
  const days=document.getElementById('nc-days').value.split(',').map(d=>d.trim()).filter(Boolean);
  const newClient={id:genId(),name,contactName:document.getElementById('nc-contact').value.trim(),industry:document.getElementById('nc-industry').value.trim(),serviceType:document.getElementById('nc-service').value,referrer:document.getElementById('nc-referrer').value.trim(),status:document.getElementById('nc-status').value,contractStart:document.getElementById('nc-start').value,contractPeriod:document.getElementById('nc-period').value.trim(),monthlyCount:parseInt(document.getElementById('nc-count').value)||0,postDays:days,goal:document.getElementById('nc-goal').value.trim(),memo:'',contractAmount:parseInt(document.getElementById('nc-amount').value)||0,memberIds:{director:document.getElementById('nc-director').value,editor:document.getElementById('nc-editor').value,checker:state.currentUser.id}};
  db.clients.push(newClient);
  if(newClient.status==='active'&&days.length&&newClient.monthlyCount>0){
    const schedules=generateSchedule(newClient.contractStart||new Date().toISOString().split('T')[0],days,newClient.monthlyCount*2);
    schedules.forEach((s,i)=>{db.videos.push({id:genId(),clientId:newClient.id,videoNo:i+1,status:'material_submitted',shootDate:s.shootDate,editDueDate:s.editDueDate,clientSubmitDate:s.clientSubmitDate,postDate:s.postDate,editorId:newClient.memberIds.editor||'',driveUrl:'',memo:''});});
  }
  saveDB();closeModal();navigate('clients');
}

      <div class="field"><label>名前</label><input id="nm-name" placeholder="山田 太郎"></div>
      <div class="field"><label>権限</label><select id="nm-role"><option value="editor">編集者</option><option value="director">ディレクター</option><option value="admin">経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="nm-email" placeholder="yamada@example.com"></div>
      <div class="full field"><label>パスワード</label><input type="password" id="nm-pass" placeholder="初期パスワード"></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:8px 20px" onclick="saveNewMember()">追加する</button></div>
  </div>`);
}

function saveNewMember(){
  const name=document.getElementById('nm-name').value.trim();
  const email=document.getElementById('nm-email').value.trim();
  const pass=document.getElementById('nm-pass').value;
  if(!name||!email||!pass){alert('すべての項目を入力してください');return;}
  if(db.users.find(u=>u.email===email)){alert('このメールアドレスは既に使用されています');return;}
  db.users.push({id:genId(),name,email,password:pass,role:document.getElementById('nm-role').value,lineId:'',isActive:true});
  saveDB();closeModal();navigate('members');
}

function showEditMemberModal(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  showModal(`<div class="modal"><h2>${u.name} の編集</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="em-name" value="${u.name}"></div>
      <div class="field"><label>権限</label><select id="em-role"><option value="editor" ${u.role==='editor'?'selected':''}>編集者</option><option value="director" ${u.role==='director'?'selected':''}>ディレクター</option><option value="admin" ${u.role==='admin'?'selected':''}>経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="em-email" value="${u.email}"></div>
      <div class="full field"><label>新しいパスワード（変更する場合のみ）</label><input type="password" id="em-pass" placeholder="変更しない場合は空白"></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:8px 20px" onclick="saveEditMember('${userId}')">保存する</button></div>
  </div>`);
}

function saveEditMember(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  u.name=document.getElementById('em-name').value.trim()||u.name;
  u.email=document.getElementById('em-email').value.trim()||u.email;
  u.role=document.getElementById('em-role').value;
  const newPass=document.getElementById('em-pass').value;if(newPass)u.password=newPass;
  saveDB();closeModal();navigate('members');
}

function showEditClientModal(clientId){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  const userOptions=db.users.filter(u=>u.isActive).map(u=>`<option value="${u.id}" ${c.memberIds?.director===u.id?'selected':''}>${u.name}</option>`).join('');
  const editorOptions=db.users.filter(u=>u.isActive).map(u=>`<option value="${u.id}" ${c.memberIds?.editor===u.id?'selected':''}>${u.name}</option>`).join('');
  showModal(`<div class="modal"><h2>${c.name} の編集</h2>
    <div class="form-grid">
      <div class="field"><label>ステータス</label><select id="ec-status"><option value="active" ${c.status==='active'?'selected':''}>契約中</option><option value="negotiating" ${c.status==='negotiating'?'selected':''}>商談中</option><option value="consulting" ${c.status==='consulting'?'selected':''}>ご相談</option><option value="ended" ${c.status==='ended'?'selected':''}>契約終了</option><option value="lost" ${c.status==='lost'?'selected':''}>失注</option></select></div>
      <div class="field"><label>月本数</label><input type="number" id="ec-count" value="${c.monthlyCount}"></div>
      <div class="field"><label>投稿曜日</label><input id="ec-days" value="${c.postDays?.join(',')}" placeholder="水,金"></div>
      <div class="field"><label>契約金額</label><input type="number" id="ec-amount" value="${c.contractAmount}"></div>
      <div class="field"><label>ディレクター</label><select id="ec-director"><option value="">-</option>${userOptions}</select></div>
      <div class="field"><label>編集者</label><select id="ec-editor"><option value="">-</option>${editorOptions}</select></div>
      <div class="full field"><label>目標・課題</label><textarea id="ec-goal" rows="2" style="width:100%;padding:8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)">${c.goal||''}</textarea></div>
      <div class="full field"><label>備考</label><textarea id="ec-memo" rows="2" style="width:100%;padding:8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)">${c.memo||''}</textarea></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:8px 20px" onclick="saveEditClient('${clientId}')">保存する</button></div>
  </div>`);
}

function saveEditClient(clientId){
  const c=db.clients.find(x=>x.id===clientId);if(!c)return;
  c.status=document.getElementById('ec-status').value;
  c.monthlyCount=parseInt(document.getElementById('ec-count').value)||0;
  c.postDays=document.getElementById('ec-days').value.split(',').map(d=>d.trim()).filter(Boolean);
  c.contractAmount=parseInt(document.getElementById('ec-amount').value)||0;
  c.memberIds.director=document.getElementById('ec-director').value;
  c.memberIds.editor=document.getElementById('ec-editor').value;
  c.goal=document.getElementById('ec-goal').value.trim();
  c.memo=document.getElementById('ec-memo').value.trim();
  saveDB();closeModal();navigate('clients');
}

loadDB();
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
