<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM</title>

<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;
  --tx:#111;--tx2:#888;--tx3:#bbb;
  --bd:#e8e8e4;
  --grn:#2d7a3a;--grnbg:#eaf5ec;--grnbr:#a8d8b0;
  --blu:#1a5fa0;--blubg:#e8f0fb;--blubr:#93baea;
  --amb:#8a5200;--ambbg:#fdf3e3;--ambbr:#e8b566;
  --pur:#5c44c2;--purbg:#f0eeff;--purbr:#b3a5e8;
  --red:#b03030;--redbg:#fdeaea;--redbr:#e8a0a0;
  --teal:#0e6b58;--tealbg:#e4f5f1;--tealbr:#7dcfbe;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg2);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:15px}
button{cursor:pointer}
a{color:var(--blu);text-decoration:none}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg2)}
.login-card{background:var(--bg);border-radius:var(--r);padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);color:var(--tx)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#aaa}
.field textarea{resize:vertical}
.btn{padding:13px;background:var(--tx);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:600;width:100%;cursor:pointer}
.btn:active{opacity:0.85}
.btn-ghost{padding:10px 16px;background:transparent;color:var(--tx);border:1px solid var(--bd);border-radius:var(--r2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:active{background:var(--bg2)}
.err{color:var(--red);font-size:13px;margin-top:8px}

#app-shell{display:flex;flex-direction:column;min-height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:52px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
#topbar-title{font-size:16px;font-weight:600}
.icon-btn{width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;border-radius:var(--r2)}
.icon-btn:active{background:var(--bg2)}
.icon-btn i{font-size:20px}

#bottom-nav{display:flex;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;color:var(--tx3);font-size:10px;gap:3px;border:none;background:none}
.bnav-item i{font-size:22px}
.bnav-item.active{color:var(--tx)}
.bnav-item span{font-weight:500}

#content{flex:1;padding:1rem;padding-bottom:80px;max-width:640px;margin:0 auto;width:100%}

#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:30}
#drawer-overlay.open{display:block}
#drawer{position:fixed;top:0;right:0;bottom:0;width:280px;background:var(--bg);z-index:40;transform:translateX(100%);transition:transform 0.25s;display:flex;flex-direction:column;padding:1.5rem}
#drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blubg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--blu);flex-shrink:0}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 1.25rem}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--bd)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}

/* Calendar */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cal-nav-btn{background:none;border:1px solid var(--bd);border-radius:var(--r2);padding:7px 12px;cursor:pointer;color:var(--tx);font-size:13px;display:flex;align-items:center}
.cal-nav-btn:active{background:var(--bg2)}
.cal-title{font-size:16px;font-weight:600;flex:1;text-align:center}
.view-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.view-tab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bd);cursor:pointer;background:var(--bg);color:var(--tx2);white-space:nowrap;flex-shrink:0}
.view-tab.active{background:var(--tx);color:#fff;border-color:var(--tx)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.cal-hdr{background:var(--bg2);text-align:center;padding:7px 2px;font-size:11px;font-weight:600;color:var(--tx2)}
.cal-hdr.sun{color:var(--red)}
.cal-hdr.sat{color:var(--blu)}
.cal-cell{background:var(--bg);min-height:72px;padding:4px 3px;cursor:pointer;position:relative}
.cal-cell:active{background:var(--bg2)}
.cal-cell.other{background:#fafaf8}
.cal-cell.today .cal-dn{background:var(--tx);color:#fff;border-radius:50%}
.cal-dn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;margin-bottom:2px}
.cal-dn.sun{color:var(--red)}
.cal-dn.sat{color:var(--blu)}
.cal-ev{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;cursor:pointer}
/* Event colors by status */
.ev-material{background:var(--ambbg);color:var(--amb)}
.ev-editing{background:var(--blubg);color:var(--blu)}
.ev-submitted{background:var(--purbg);color:var(--pur)}
.ev-posted{background:var(--grnbg);color:var(--grn)}
.ev-delivered{background:var(--tealbg);color:var(--teal)}
.ev-overdue{background:var(--redbg);color:var(--red)}
.ev-urgent{background:#fff3cd;color:#7a5000}

/* Left bar colors for video cards */
.bar-material{background:var(--amb)}
.bar-editing{background:var(--blu)}
.bar-submitted{background:var(--pur)}
.bar-posted{background:var(--grn)}
.bar-delivered{background:var(--teal)}
.bar-overdue{background:var(--red)}
.bar-urgent{background:#e08a00}

.video-card{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.video-card:active{background:var(--bg2)}
.vc-bar{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.vc-body{flex:1;min-width:0}
.vc-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-meta{font-size:12px;color:var(--tx2);margin-top:2px}

.ss-option{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;border-bottom:1px solid var(--bd)}
.ss-option:last-child{border-bottom:none}
.ss-option:active{background:var(--bg2)}
.ss-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.alert{display:flex;align-items:flex-start;gap:8px;padding:12px;border-radius:var(--r2);margin-bottom:8px;font-size:13px;line-height:1.5}
.alert-warn{background:var(--ambbg);color:var(--amb)}
.alert-info{background:var(--blubg);color:var(--blu)}
.alert-ok{background:var(--grnbg);color:var(--grn)}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}

.section-label{font-size:12px;font-weight:600;color:var(--tx2);padding:8px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.prow{background:var(--bg);border-radius:var(--r2);padding:14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--bd)}
.prow:active{background:var(--bg2)}
.prow-bar{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0}
.prow-body{flex:1;min-width:0}
.prow-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow-meta{font-size:12px;color:var(--tx2);margin-top:2px}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:500;color:var(--tx2);padding:8px;border-bottom:1px solid var(--bd)}
td{padding:12px 8px;border-bottom:1px solid var(--bd);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}

.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}

.lbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--r2);font-size:12px;background:var(--bg2);color:var(--tx2);border:1px solid var(--bd);text-decoration:none}
.empty{text-align:center;padding:3rem 1rem;color:var(--tx2);font-size:14px}

/* Quick add */
.quick-add-banner{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r2);padding:14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>

let CU=null,PAGE='calendar',CALVIEW='post',CALY=2026,CALM=4,PS='',PF='';
let db={};

function loadDB(){
  const s=localStorage.getItem('crm_v6');
  if(s){db=JSON.parse(s);}
  else{db={users:JSON.parse(JSON.stringify(DEFAULT_USERS)),clients:JSON.parse(JSON.stringify(ALL_CLIENTS)),videos:JSON.parse(JSON.stringify(DEFAULT_VIDEOS))};saveDB();}
}
function saveDB(){localStorage.setItem('crm_v6',JSON.stringify(db));}
function gid(){return'i'+Math.random().toString(36).substr(2,8);}
function isAdmin(){return CU?.role==='admin';}
function isDir(){return CU?.role==='director';}
function isEditor(){return CU?.role==='editor';}
function getUser(id){return db.users.find(u=>u.id===id)||null;}
function getClient(id){return db.clients.find(c=>c.id===id)||null;}
function visVids(){if(isAdmin()||isDir())return db.videos;return db.videos.filter(v=>v.editorId===CU.id);}
function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function fmt(d){if(!d)return'-';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;}
function toDS(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function viewDate(v){if(CALVIEW==='edit')return v.editDueDate;if(CALVIEW==='submit')return v.clientSubmitDate;return v.postDate;}
function addDays(dateStr,n){const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}

function doLogin(){
  const em=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  let user;
  if(em==='1'&&pw==='1')user=db.users.find(u=>u.role==='admin'&&u.isActive);
  else user=db.users.find(u=>u.email===em&&u.password===pw&&u.isActive);
  if(!user){const el=document.getElementById('login-error');el.textContent='メールアドレスまたはパスワードが違います';el.classList.remove('hidden');return;}
  CU=user;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  if(isAdmin())document.getElementById('bnav-members').classList.remove('hidden');
  setupDrawer();
  const t=new Date();CALY=t.getFullYear();CALM=t.getMonth();
  navigate('calendar');
}
function doLogout(){CU=null;document.getElementById('login-screen').classList.remove('hidden');document.getElementById('app-shell').classList.add('hidden');closeDrawer();}

function setupDrawer(){
  document.getElementById('drawer-avatar').textContent=CU.name.charAt(0);
  document.getElementById('drawer-name').textContent=CU.name;
  const rm={admin:'経営層',director:'ディレクター',editor:'編集者'};
  document.getElementById('drawer-role').textContent=rm[CU.role]||'';
  const db2=document.getElementById('drawer-btns');
  if(isAdmin()||isDir()){
    db2.innerHTML=`
      <button class="btn-ghost" style="width:100%;justify-content:center;margin-bottom:8px" onclick="closeDrawer();showQuickAddModal()"><i class="ti ti-plus"></i>案件をすばやく追加</button>
      <button class="btn-ghost" style="width:100%;justify-content:center;margin-bottom:8px" onclick="closeDrawer();showAddClientModal()"><i class="ti ti-building"></i>クライアント追加</button>
      <button class="btn-ghost" style="width:100%;justify-content:center" onclick="closeDrawer();showAddVideoModal()"><i class="ti ti-video"></i>動画を追加</button>`;
  }else{db2.innerHTML='';}
}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

function navigate(page){
  PAGE=page;
  const titles={calendar:'カレンダー',prospects:'見込み顧客',members:'設定'};
  document.getElementById('topbar-title').textContent=titles[page]||'';
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const bn=document.getElementById('bnav-'+page);if(bn)bn.classList.add('active');
  const fns={calendar:renderCalendar,prospects:renderProspects,members:renderMembers};
  if(fns[page])document.getElementById('content').innerHTML=fns[page]();
}

function renderCalendar(){
  const y=CALY,m=CALM;
  const firstDow=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];

  // Alerts
  const videos=visVids();
  const alerts=[];
  videos.filter(v=>v.status!=='posted'&&v.status!=='delivered').forEach(v=>{
    const c=getClient(v.clientId);const cn=c?c.name:'不明';
    const ed=daysUntil(v.editDueDate);const sd=daysUntil(v.clientSubmitDate);const pd=daysUntil(v.postDate);
    if((isAdmin()||isEditor())&&ed!==null&&ed>=0&&ed<=2&&v.status==='material_submitted')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — 編集完了まであと${ed}日`});
    if((isAdmin()||isDir())&&sd!==null&&sd>=0&&sd<=1&&v.status==='editing')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — お客様提出まであと${sd}日`});
    if((isAdmin()||isDir())&&pd===0&&v.status==='submitted_to_client')
      alerts.push({type:'info',msg:`${cn} No.${v.videoNo} — 本日が投稿日です`});
  });
  const alertHtml=alerts.length
    ?alerts.map(a=>`<div class="alert alert-${a.type}"><i class="ti ti-bell"></i><span>${a.msg}</span></div>`).join('')
    :`<div class="alert alert-ok"><i class="ti ti-check"></i><span>本日のリマインドはありません</span></div>`;

  // Build date→videos map
  const byDate={};
  videos.forEach(v=>{const d=viewDate(v);if(!d)return;if(!byDate[d])byDate[d]=[];byDate[d].push(v);});

  // View tabs
  const tabsHtml=isAdmin()
    ?`<div class="view-tabs">
        <button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button>
        <button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button>
        <button class="view-tab ${CALVIEW==='edit'?'active':''}" onclick="setCalView('edit')">編集完了日</button>
      </div>`
    :isDir()
    ?`<div class="view-tabs">
        <button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button>
        <button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button>
      </div>`:'';

  // Calendar grid
  const hdrs=['日','月','火','水','木','金','土'].map((d,i)=>`<div class="cal-hdr ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const totalCells=Math.ceil((firstDow+daysInMonth)/7)*7;
  let cells='';
  for(let i=0;i<totalCells;i++){
    let day,mo,yr,isOther=false;
    if(i<firstDow){day=prevLast-firstDow+i+1;mo=m-1;yr=y;isOther=true;}
    else if(i>=firstDow+daysInMonth){day=i-firstDow-daysInMonth+1;mo=m+1;yr=y;isOther=true;}
    else{day=i-firstDow+1;mo=m;yr=y;}
    const ds=toDS(yr,mo,day);
    const isToday=ds===todayStr;
    const dow=new Date(yr,mo,day).getDay();
    const dayVids=(byDate[ds]||[]);
    const evHtml=dayVids.slice(0,3).map(v=>{
      const c=getClient(v.clientId);
      const cls=getEvClass(v);
      return`<div class="cal-ev ${cls}" onclick="showVideoModal('${v.id}');event.stopPropagation()">${c?.name||'?'} No.${v.videoNo}</div>`;
    }).join('');
    const more=dayVids.length>3?`<div style="font-size:10px;color:var(--tx2)">+${dayVids.length-3}</div>`:'';
    cells+=`<div class="cal-cell${isOther?' other':''}${isToday?' today':''}" onclick="showDayModal('${ds}')">
      <div class="cal-dn${dow===0?' sun':dow===6?' sat':''}">${day}</div>
      ${evHtml}${more}
    </div>`;
  }

  const legend=`<div style="font-size:11px;color:var(--tx2);margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--ambbg);border:1px solid var(--ambbr);display:inline-block"></span>素材提出済</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--blubg);border:1px solid var(--blubr);display:inline-block"></span>編集中</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--purbg);border:1px solid var(--purbr);display:inline-block"></span>お客様提出済</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--grnbg);border:1px solid var(--grnbr);display:inline-block"></span>投稿済/納品完了</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:#fff3cd;border:1px solid #e8b566;display:inline-block"></span>期限2日以内</span>
    <span style="display:flex;align-items:center;gap:3px"><span style="width:9px;height:9px;border-radius:2px;background:var(--redbg);border:1px solid var(--redbr);display:inline-block"></span>期限超過</span>
  </div>`;

  const quickAdd=isAdmin()||isDir()?`<div class="quick-add-banner">
    <div>
      <div style="font-weight:600;font-size:14px">案件をすばやく追加</div>
      <div style="font-size:12px;color:var(--tx2);margin-top:2px">投稿日を入力するだけで日程を自動生成</div>
    </div>
    <button class="btn-ghost" onclick="showQuickAddModal()"><i class="ti ti-plus"></i>追加</button>
  </div>`:'';

  return`<div style="margin-bottom:10px">${alertHtml}</div>
    ${quickAdd}
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title">${y}年 ${MONTHS[m]}</div>
      <button class="cal-nav-btn" onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
      <button class="cal-nav-btn" onclick="goToday()" style="font-size:12px">今月</button>
    </div>
    ${tabsHtml}
    ${legend}
    <div class="cal-grid">${hdrs}${cells}</div>`;
}

function setCalView(v){CALVIEW=v;navigate('calendar');}
function prevMonth(){if(CALM===0){CALM=11;CALY--;}else{CALM--;}navigate('calendar');}
function nextMonth(){if(CALM===11){CALM=0;CALY++;}else{CALM++;}navigate('calendar');}
function goToday(){const t=new Date();CALY=t.getFullYear();CALM=t.getMonth();navigate('calendar');}

function updateQuickAddPreview(){

  if(!postDate){previewEl.innerHTML='<span style="color:var(--tx2)">投稿日を入力してください</span>';return;}

  previewEl.innerHTML=`

function saveQuickAdd(){
  const clientId=document.getElementById('qa-client').value;
  const postDate=document.getElementById('qa-post').value;
  const no=parseInt(document.getElementById('qa-no').value)||null;
  if(!clientId||!postDate){alert('クライアントと投稿日を入力してください');return;}
  const clientSubmit=addDays(postDate,-2);
  const editDue=addDays(postDate,-4);
  const shootDate=addDays(postDate,-8);
  // Auto-assign video number if not specified
  const existingNos=db.videos.filter(v=>v.clientId===clientId).map(v=>v.videoNo);
  const videoNo=no||(existingNos.length?Math.max(...existingNos)+1:1);
  db.videos.push({
    id:gid(),clientId,videoNo,status:'material_submitted',
    shootDate,editDueDate:editDue,clientSubmitDate:clientSubmit,postDate,
    editorId:document.getElementById('qa-editor').value
  });
  // Jump to the month of the post date
  const pd=new Date(postDate);CALY=pd.getFullYear();CALM=pd.getMonth();
  saveDB();closeModal();navigate('calendar');
}

    return`<div style="margin-bottom:1.25rem">

function saveNewClient(){
  const name=document.getElementById('nc-n').value.trim();
  if(!name){alert('クライアント名を入力してください');return;}
  const days=document.getElementById('nc-d').value.split(',').map(d=>d.trim()).filter(Boolean);
  const nc={id:gid(),name,contactName:document.getElementById('nc-c').value.trim(),industry:document.getElementById('nc-i').value.trim(),contractType:document.getElementById('nc-ct').value,serviceType:document.getElementById('nc-sv').value,referrer:document.getElementById('nc-r').value.trim(),status:document.getElementById('nc-st').value,contractStart:document.getElementById('nc-s').value,contractPeriod:'',monthlyCount:parseInt(document.getElementById('nc-cnt').value)||0,postDays:days,goal:document.getElementById('nc-g').value.trim(),memo:'',contractAmount:isAdmin()?(parseInt(document.getElementById('nc-amt')?.value)||0):0,memberIds:{director:document.getElementById('nc-dir').value,editor:document.getElementById('nc-ed').value},links:{drive:document.getElementById('nc-drive').value.trim(),gemini:document.getElementById('nc-gem').value.trim(),sheet:''}};
  db.clients.push(nc);
  if(nc.status==='active'&&days.length&&nc.monthlyCount>0){
    genSched(nc.contractStart||new Date().toISOString().split('T')[0],days,nc.monthlyCount*2).forEach((s,i)=>{
      db.videos.push({id:gid(),clientId:nc.id,videoNo:i+1,status:'material_submitted',shootDate:s.shootDate,editDueDate:s.editDueDate,clientSubmitDate:s.clientSubmitDate,postDate:s.postDate,editorId:nc.memberIds.editor||''});
    });
  }
  saveDB();closeModal();navigate(nc.status==='active'?'calendar':'prospects');
}

function genSched(start,pdays,count){
  const dm={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const td=pdays.map(d=>dm[d]).filter(d=>d!==undefined);
  if(!td.length)return[];
  const res=[];const cur=new Date(start);cur.setHours(0,0,0,0);
  while(res.length<count){
    if(td.includes(cur.getDay())){
      const p=new Date(cur);
      res.push({
        postDate:p.toISOString().split('T')[0],
        clientSubmitDate:addDays(p.toISOString().split('T')[0],-2),
        editDueDate:addDays(p.toISOString().split('T')[0],-4),
        shootDate:addDays(p.toISOString().split('T')[0],-8)
      });
    }
    cur.setDate(cur.getDate()+1);
  }
  return res;
}

      <div class="field"><label>動画No.</label><input type="number" id="nv-no" min="1"></div>
      <div class="field"><label>ステータス</label><select id="nv-s"><option value="material_submitted">素材提出済</option><option value="editing">編集中</option><option value="submitted_to_client">お客様提出済</option><option value="posted">投稿済</option><option value="delivered">納品完了</option></select></div>
      <div class="field"><label>編集完了日</label><input type="date" id="nv-e"></div>
      <div class="field"><label>お客様提出日</label><input type="date" id="nv-cs"></div>
      <div class="field"><label>投稿日</label><input type="date" id="nv-p"></div>
      <div class="full field"><label>編集担当</label><select id="nv-ed"><option value="">-</option>${eopts}</select></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveNewVideo()">追加</button>
    </div>
  </div>`);
}

function saveNewVideo(){
  const clientId=document.getElementById('nv-c').value;const no=parseInt(document.getElementById('nv-no').value);
  if(!clientId||!no){alert('クライアントと動画No.を入力してください');return;}
  db.videos.push({id:gid(),clientId,videoNo:no,status:document.getElementById('nv-s').value,editDueDate:document.getElementById('nv-e').value,clientSubmitDate:document.getElementById('nv-cs').value,postDate:document.getElementById('nv-p').value,editorId:document.getElementById('nv-ed').value});
  saveDB();closeModal();navigate('calendar');
}

function showAddMemberModal(){
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>メンバー追加</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="nm-n" placeholder="山田 太郎"></div>
      <div class="field"><label>権限</label><select id="nm-r"><option value="editor">編集者</option><option value="director">ディレクター</option><option value="admin">経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="nm-e"></div>
      <div class="full field"><label>パスワード</label><input type="password" id="nm-p"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveNewMember()">追加</button>
    </div>
  </div>`);
}

function saveNewMember(){
  const name=document.getElementById('nm-n').value.trim();const email=document.getElementById('nm-e').value.trim();const pass=document.getElementById('nm-p').value;
  if(!name||!email||!pass){alert('すべて入力してください');return;}
  if(db.users.find(u=>u.email===email)){alert('このメールアドレスは使用済みです');return;}
  db.users.push({id:gid(),name,email,password:pass,role:document.getElementById('nm-r').value,isActive:true});
  saveDB();closeModal();navigate('members');
}

function showEditMemberModal(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <h2>${u.name} の編集</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="em-n" value="${u.name}"></div>
      <div class="field"><label>権限</label><select id="em-r"><option value="editor" ${u.role==='editor'?'selected':''}>編集者</option><option value="director" ${u.role==='director'?'selected':''}>ディレクター</option><option value="admin" ${u.role==='admin'?'selected':''}>経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="em-e" value="${u.email}"></div>
      <div class="full field"><label>新しいパスワード（変更時のみ）</label><input type="password" id="em-p"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="saveEditMember('${userId}')">保存</button>
    </div>
  </div>`);
}

function saveEditMember(id){
  const u=db.users.find(x=>x.id===id);if(!u)return;
  u.name=document.getElementById('em-n').value.trim()||u.name;
  u.email=document.getElementById('em-e').value.trim()||u.email;
  u.role=document.getElementById('em-r').value;
  const np=document.getElementById('em-p').value;if(np)u.password=np;
  saveDB();closeModal();navigate('members');
}

function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="closeModalOnOverlay(event)">${html}</div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function closeModalOnOverlay(e){if(e.target.classList.contains('modal-overlay'))closeModal();}

loadDB();
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
