<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefec;
  --tx:#111;--tx2:#888;--tx3:#bbb;
  --bd:#e8e8e4;
  --acc:#111;
  --grn:#2d7a3a;--grnbg:#eaf5ec;
  --blu:#1a5fa0;--blubg:#e8f0fb;
  --amb:#8a5200;--ambbg:#fdf3e3;
  --pur:#5c44c2;--purbg:#f0eeff;
  --red:#b03030;--redbg:#fdeaea;
  --teal:#0e6b58;--tealbg:#e4f5f1;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:15px;color:var(--tx);background:var(--bg2);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:15px}
button{cursor:pointer}
a{color:var(--blu);text-decoration:none}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background:var(--bg2)}
.login-card{background:var(--bg);border-radius:var(--r);padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 16px rgba(0,0,0,0.06)}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);color:var(--tx);font-size:15px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--acc)}
.field textarea{resize:vertical}
.btn{padding:13px;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:600;width:100%;cursor:pointer}
.btn:active{opacity:0.85}
.btn-ghost{padding:10px 16px;background:transparent;color:var(--tx);border:1px solid var(--bd);border-radius:var(--r2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:active{background:var(--bg2)}
.btn-danger{padding:10px 16px;background:transparent;color:var(--red);border:1px solid #f0b8b8;border-radius:var(--r2);font-size:14px;cursor:pointer}
.err{color:var(--red);font-size:13px;margin-top:8px}

/* App shell */
#app-shell{display:flex;flex-direction:column;min-height:100vh}

/* Top bar */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:52px;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20}
#topbar-title{font-size:16px;font-weight:600}
.icon-btn{width:36px;height:36px;background:none;border:none;cursor:pointer;color:var(--tx);display:flex;align-items:center;justify-content:center;border-radius:var(--r2)}
.icon-btn:active{background:var(--bg2)}
.icon-btn i{font-size:20px}

/* Bottom nav */
#bottom-nav{display:flex;background:var(--bg);border-top:1px solid var(--bd);position:fixed;bottom:0;left:0;right:0;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 0;cursor:pointer;color:var(--tx3);font-size:10px;gap:3px;border:none;background:none}
.bnav-item i{font-size:22px}
.bnav-item.active{color:var(--acc)}
.bnav-item span{font-weight:500}

/* Content */
#content{flex:1;padding:1rem;padding-bottom:80px;max-width:600px;margin:0 auto;width:100%}

/* Drawer */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:30}
#drawer-overlay.open{display:block}
#drawer{position:fixed;top:0;right:0;bottom:0;width:280px;background:var(--bg);z-index:40;transform:translateX(100%);transition:transform 0.25s;display:flex;flex-direction:column;padding:1.5rem}
#drawer.open{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.drawer-user{display:flex;align-items:center;gap:10px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--blubg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--blu);flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:1.5rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 1.25rem}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--bd)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}

/* Status pill */
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.p-material{background:var(--ambbg);color:var(--amb)}
.p-editing{background:var(--blubg);color:var(--blu)}
.p-submitted{background:var(--purbg);color:var(--pur)}
.p-posted{background:var(--grnbg);color:var(--grn)}
.p-delivered{background:var(--tealbg);color:var(--teal)}
.p-active{background:var(--grnbg);color:var(--grn)}
.p-negotiating{background:var(--ambbg);color:var(--amb)}
.p-consulting{background:var(--blubg);color:var(--blu)}
.p-ended{background:var(--bg3);color:var(--tx2)}
.p-lost{background:var(--redbg);color:var(--red)}

/* Calendar list */
.day-group{margin-bottom:1.25rem}
.day-label{font-size:12px;font-weight:600;color:var(--tx2);padding:6px 0;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.day-label.today-label{color:var(--acc)}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--tx3)}
.day-dot.today-dot{background:var(--acc)}

.video-card{background:var(--bg);border-radius:var(--r2);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--bd);transition:background 0.1s}
.video-card:active{background:var(--bg2)}
.video-card-left{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.vc-grn{background:var(--grn)}
.vc-blu{background:var(--blu)}
.vc-amb{background:#e08a00}
.vc-red{background:var(--red)}
.vc-teal{background:var(--teal)}
.video-card-body{flex:1;min-width:0}
.vc-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vc-meta{font-size:12px;color:var(--tx2);margin-top:2px}
.vc-arrow{color:var(--tx3);flex-shrink:0}

/* View tabs */
.view-tabs{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
.view-tab{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--bd);cursor:pointer;background:var(--bg);color:var(--tx2);white-space:nowrap;flex-shrink:0}
.view-tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* Prospect */
.section-label{font-size:12px;font-weight:600;color:var(--tx2);padding:8px 0 6px;border-bottom:1px solid var(--bd);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.prow{background:var(--bg);border-radius:var(--r2);padding:14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--bd)}
.prow:active{background:var(--bg2)}
.prow-bar{width:3px;align-self:stretch;border-radius:3px;flex-shrink:0}
.prow-body{flex:1;min-width:0}
.prow-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow-meta{font-size:12px;color:var(--tx2);margin-top:2px}

/* Alert */
.alert{display:flex;align-items:flex-start;gap:8px;padding:12px;border-radius:var(--r2);margin-bottom:8px;font-size:13px;line-height:1.5}
.alert-warn{background:var(--ambbg);color:var(--amb)}
.alert-info{background:var(--blubg);color:var(--blu)}
.alert-ok{background:var(--grnbg);color:var(--grn)}
.alert i{font-size:16px;flex-shrink:0;margin-top:1px}

/* Status select sheet */
.status-sheet{padding:0}
.ss-option{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;border-bottom:1px solid var(--bd)}
.ss-option:last-child{border-bottom:none}
.ss-option:active{background:var(--bg2)}
.ss-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ss-label{font-size:15px;font-weight:500}
.ss-check{margin-left:auto;color:var(--acc);font-size:18px}

.empty{text-align:center;padding:3rem 1rem;color:var(--tx2);font-size:14px}
.lbtn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:var(--r2);font-size:12px;background:var(--bg2);color:var(--tx2);border:1px solid var(--bd);text-decoration:none}

/* Members table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:500;color:var(--tx2);padding:8px;border-bottom:1px solid var(--bd)}
td{padding:12px 8px;border-bottom:1px solid var(--bd);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
</style>
</head>

function loadDB(){

  if(s){db=JSON.parse(s);}
  else{db={users:JSON.parse(JSON.stringify(DEFAULT_USERS)),clients:JSON.parse(JSON.stringify(ALL_CLIENTS)),videos:JSON.parse(JSON.stringify(DEFAULT_VIDEOS))};saveDB();}
}
function saveDB(){localStorage.setItem('crm_v5',JSON.stringify(db));}
function gid(){return 'i'+Math.random().toString(36).substr(2,8);}
function isAdmin(){return CU?.role==='admin';}
function isDir(){return CU?.role==='director';}
function isEditor(){return CU?.role==='editor';}
function getUser(id){return db.users.find(u=>u.id===id)||null;}
function getClient(id){return db.clients.find(c=>c.id===id)||null;}

function visVids(){
  if(isAdmin()||isDir())return db.videos;
  return db.videos.filter(v=>v.editorId===CU.id);
}

function daysUntil(d){
  if(!d)return null;
  const t=new Date();t.setHours(0,0,0,0);
  const x=new Date(d);x.setHours(0,0,0,0);
  return Math.round((x-t)/86400000);
}
function fmt(d){
  if(!d)return'-';
  const dt=new Date(d);
  return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;
}

const SM={material_submitted:'素材提出済',editing:'編集中',submitted_to_client:'お客様提出済',posted:'投稿済',delivered:'納品完了'};
const SC={material_submitted:'p-material',editing:'p-editing',submitted_to_client:'p-submitted',posted:'p-posted',delivered:'p-delivered'};
const SDOT={material_submitted:'#c07800',editing:'#1a5fa0',submitted_to_client:'#5c44c2',posted:'#2d7a3a',delivered:'#0e6b58'};

function pill(t,c){return`<span class="pill ${c}">${t}</span>`;}
function sPill(s){return pill(SM[s]||s,SC[s]||'');}

function vcColor(v){
  const s=v.status;
  if(s==='posted'||s==='delivered')return'vc-grn';
  const ref=CALVIEW==='edit'?v.editDueDate:CALVIEW==='submit'?v.clientSubmitDate:v.postDate;
  const d=daysUntil(ref);
  if(d===null)return'vc-blu';
  if(d<0)return'vc-red';
  if(d<=2)return'vc-amb';
  return'vc-blu';
}
function viewDate(v){
  if(CALVIEW==='edit')return v.editDueDate;
  if(CALVIEW==='submit')return v.clientSubmitDate;
  return v.postDate;
}

function doLogin(){
  const em=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  let user;
  if(em==='1'&&pw==='1')user=db.users.find(u=>u.role==='admin'&&u.isActive);
  else user=db.users.find(u=>u.email===em&&u.password===pw&&u.isActive);
  if(!user){const el=document.getElementById('login-error');el.textContent='メールアドレスまたはパスワードが違います';el.classList.remove('hidden');return;}
  CU=user;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  if(isAdmin())document.getElementById('bnav-members').classList.remove('hidden');
  setupDrawer();
  navigate('calendar');
}
function doLogout(){
  CU=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app-shell').classList.add('hidden');
  closeDrawer();
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
}

function setupDrawer(){
  document.getElementById('drawer-avatar').textContent=CU.name.charAt(0);
  document.getElementById('drawer-name').textContent=CU.name;
  const rm={admin:'経営層',director:'ディレクター',editor:'編集者'};
  document.getElementById('drawer-role').textContent=rm[CU.role]||'';

}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

function navigate(page){
  PAGE=page;
  const titles={calendar:'カレンダー',prospects:'見込み顧客',members:'設定'};
  document.getElementById('topbar-title').textContent=titles[page]||'';
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const bn=document.getElementById('bnav-'+page);
  if(bn)bn.classList.add('active');
  const fns={calendar:renderCalendar,prospects:renderProspects,members:renderMembers};
  if(fns[page])document.getElementById('content').innerHTML=fns[page]();
}

function renderCalendar(){
  const today=new Date();today.setHours(0,0,0,0);
  const end=new Date(today);end.setDate(end.getDate()+21);

  const videos=visVids();
  const byDate={};
  videos.forEach(v=>{
    const d=viewDate(v);if(!d)return;
    const vd=new Date(d);vd.setHours(0,0,0,0);
    if(vd>=today&&vd<=end){
      if(!byDate[d])byDate[d]=[];
      byDate[d].push(v);
    }
  });

  const alerts=[];
  videos.filter(v=>v.status!=='posted'&&v.status!=='delivered').forEach(v=>{
    const c=getClient(v.clientId);const cn=c?c.name:'不明';
    const ed=daysUntil(v.editDueDate);const sd=daysUntil(v.clientSubmitDate);const pd=daysUntil(v.postDate);
    if((isAdmin()||isEditor())&&ed!==null&&ed>=0&&ed<=2&&v.status==='material_submitted')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — 編集完了まであと${ed}日`});
    if((isAdmin()||isDir())&&sd!==null&&sd>=0&&sd<=1&&v.status==='editing')
      alerts.push({type:'warn',msg:`${cn} No.${v.videoNo} — お客様提出まであと${sd}日`});
    if((isAdmin()||isDir())&&pd===0&&v.status==='submitted_to_client')
      alerts.push({type:'info',msg:`${cn} No.${v.videoNo} — 本日が投稿日です`});
  });

  const alertHtml=alerts.length
    ?alerts.map(a=>`<div class="alert alert-${a.type}"><i class="ti ti-bell"></i><span>${a.msg}</span></div>`).join('')
    :`<div class="alert alert-ok"><i class="ti ti-check"></i><span>本日のリマインドはありません</span></div>`;

  const viewTabsHtml=isAdmin()
    ?`<button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button>
      <button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button>
      <button class="view-tab ${CALVIEW==='edit'?'active':''}" onclick="setCalView('edit')">編集完了日</button>`
    :isDir()
    ?`<button class="view-tab ${CALVIEW==='post'?'active':''}" onclick="setCalView('post')">投稿日</button>
      <button class="view-tab ${CALVIEW==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button>`
    :'';

  const sortedDates=Object.keys(byDate).sort();
  const daysHtml=sortedDates.length?sortedDates.map(dateStr=>{
    const dt=new Date(dateStr);dt.setHours(0,0,0,0);
    const isToday=dt.getTime()===today.getTime();
    const dow=dt.getDay();
    const label=`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dow]})`;
    const cards=byDate[dateStr].map(v=>{
      const c=getClient(v.clientId);
      const col=vcColor(v);
      const editor=getUser(v.editorId);
      return`<div class="video-card" onclick="showVideoModal('${v.id}')">
        <div class="video-card-left ${col}"></div>
        <div class="video-card-body">
          <div class="vc-name">${c?.name||'-'} <span style="font-weight:400;color:var(--tx2)">No.${v.videoNo}</span></div>
          <div class="vc-meta">${SM[v.status]} ${editor?'· '+editor.name:''}</div>
        </div>
        <i class="ti ti-chevron-right vc-arrow"></i>
      </div>`;
    }).join('');
    return`<div class="day-group">
      <div class="day-label ${isToday?'today-label':''}">
        <div class="day-dot ${isToday?'today-dot':''}"></div>
        ${label}${isToday?' · 今日':''}
      </div>
      ${cards}
    </div>`;
  }).join(''):`<div class="empty">この期間に動画の予定はありません</div>`;

  return`<div style="margin-bottom:12px">${alertHtml}</div>
    ${viewTabsHtml?`<div class="view-tabs">${viewTabsHtml}</div>`:''}
    ${daysHtml}`;
}

function setCalView(v){CALVIEW=v;navigate('calendar');}

function showVideoModal(videoId){
  const v=db.videos.find(x=>x.id===videoId);if(!v)return;
  const c=getClient(v.clientId);const ed=getUser(v.editorId);
  const isDelivery=c?.contractType==='delivery';
  const opts=isDelivery
    ?['material_submitted','editing','delivered']
    :['material_submitted','editing','submitted_to_client','posted'];

  const optRows=opts.map(s=>`<div class="ss-option" onclick="updateStatus('${v.id}','${s}')">
    <div class="ss-dot" style="background:${SDOT[s]}"></div>
    <div class="ss-label">${SM[s]}</div>
    ${v.status===s?'<i class="ti ti-check ss-check"></i>':''}
  </div>`).join('');

  const links=[
    c?.links?.drive?`<a href="${c.links.drive}" target="_blank" class="lbtn"><i class="ti ti-folder"></i>Drive</a>`:'',
    c?.links?.gemini?`<a href="${c.links.gemini}" target="_blank" class="lbtn"><i class="ti ti-sparkles"></i>Gemini</a>`:'',
  ].filter(Boolean).join('');

  showModal(`<div class="modal">
    <div class="modal-handle"></div>
    <div style="margin-bottom:16px">
      <div style="font-size:18px;font-weight:700">${c?.name||'-'}</div>
      <div style="font-size:14px;color:var(--tx2);margin-top:2px">No.${v.videoNo} · ${ed?.name||'-'}</div>
    </div>
    <div style="font-size:13px;color:var(--tx2);font-weight:600;margin-bottom:6px">ステータスを選択</div>
    <div style="border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:16px">${optRows}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px">
      <div><div style="color:var(--tx2);font-size:11px;margin-bottom:2px">編集完了</div><div style="font-weight:500">${fmt(v.editDueDate)}</div></div>
      <div><div style="color:var(--tx2);font-size:11px;margin-bottom:2px">お客様提出</div><div style="font-weight:500">${fmt(v.clientSubmitDate)}</div></div>
      <div><div style="color:var(--tx2);font-size:11px;margin-bottom:2px">投稿日</div><div style="font-weight:500">${fmt(v.postDate)}</div></div>
    </div>
    ${links?`<div style="display:flex;gap:6px;margin-bottom:12px">${links}</div>`:''}
    <div class="modal-footer"><button class="btn-ghost" onclick="closeModal()">閉じる</button></div>
  </div>`);
}

function updateStatus(videoId,newStatus){

  navigate(PAGE);
}

  const nonActive=db.clients.filter(c=>c.status!=='active').filter(c=>{

    if(search&&!c.name.toLowerCase().includes(search)&&!(c.contactName||'').toLowerCase().includes(search)&&!(c.industry||'').toLowerCase().includes(search))return false;
    return true;
  });
  const groups=[
    {key:'negotiating',label:'商談中',color:'var(--amb)'},
    {key:'consulting',label:'ご相談',color:'var(--blu)'},
    {key:'ended',label:'契約終了',color:'var(--tx3)'},

  const searchHtml=`<input type="text" placeholder="名前・業種で検索..." value="${PS}" oninput="setPS(this.value)" style="width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r2);background:var(--bg);font-size:14px;margin-bottom:1rem">`;
  const groupsHtml=groups.map(g=>{
    const items=nonActive.filter(c=>c.status===g.key);
    if(!items.length)return'';
    return`<div style="margin-bottom:1.25rem">
      <div class="section-label"><span>${g.label} <span style="color:var(--tx2);font-weight:400">${items.length}件</span></span></div>
      ${items.map(c=>{

function saveNewClient(){
  const name=document.getElementById('nc-n').value.trim();
  if(!name){alert('クライアント名を入力してください');return;}
  const days=document.getElementById('nc-d').value.split(',').map(d=>d.trim()).filter(Boolean);
  const nc={id:gid(),name,contactName:document.getElementById('nc-c').value.trim(),industry:document.getElementById('nc-i').value.trim(),contractType:document.getElementById('nc-ct').value,serviceType:document.getElementById('nc-sv').value,referrer:document.getElementById('nc-r').value.trim(),status:document.getElementById('nc-st').value,contractStart:document.getElementById('nc-s').value,contractPeriod:'',monthlyCount:parseInt(document.getElementById('nc-cnt').value)||0,postDays:days,goal:document.getElementById('nc-g').value.trim(),memo:'',contractAmount:isAdmin()?(parseInt(document.getElementById('nc-amt')?.value)||0):0,memberIds:{director:document.getElementById('nc-dir').value,editor:document.getElementById('nc-ed').value},links:{drive:document.getElementById('nc-drive').value.trim(),gemini:document.getElementById('nc-gem').value.trim(),sheet:''}};
  db.clients.push(nc);
  if(nc.status==='active'&&days.length&&nc.monthlyCount>0){
    genSched(nc.contractStart||new Date().toISOString().split('T')[0],days,nc.monthlyCount*2).forEach((s,i)=>{
      db.videos.push({id:gid(),clientId:nc.id,videoNo:i+1,status:'material_submitted',editDueDate:s.editDueDate,clientSubmitDate:s.clientSubmitDate,postDate:s.postDate,editorId:nc.memberIds.editor||''});
    });
  }
  saveDB();closeModal();navigate(nc.status==='active'?'calendar':'prospects');
}

function genSched(start,pdays,count){
  const dm={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const td=pdays.map(d=>dm[d]).filter(d=>d!==undefined);
  if(!td.length)return[];
  const res=[];const cur=new Date(start);cur.setHours(0,0,0,0);
  while(res.length<count){
    if(td.includes(cur.getDay())){
      const p=new Date(cur);
      const cs=new Date(cur);cs.setDate(cs.getDate()-2);
      const ed=new Date(cur);ed.setDate(ed.getDate()-4);
      res.push({postDate:p.toISOString().split('T')[0],clientSubmitDate:cs.toISOString().split('T')[0],editDueDate:ed.toISOString().split('T')[0]});
    }
    cur.setDate(cur.getDate()+1);
  }
  return res;
}
