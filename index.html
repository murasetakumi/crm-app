<html lang="ja">

<style>
:root{
  --bg:#fff;--bg2:#f5f5f0;--bg3:#eeede8;
  --tx:#1a1a1a;--tx2:#666660;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.2);
  --red:#a32d2d;--redbg:#fcebeb;--redbr:#f09595;
  --grn:#3b6d11;--grnbg:#eaf3de;--grnbr:#c0dd97;
  --blu:#185fa5;--blubg:#e6f1fb;--blubr:#b5d4f4;
  --amb:#854f0b;--ambbg:#faeeda;--ambbr:#fac775;
  --pur:#534ab7;--purbg:#eeedfe;--purbr:#afa9ec;
  --teal:#0f6e56;--tealbg:#e1f5ee;--tealbr:#9fe1cb;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--tx);background:var(--bg3);min-height:100vh}
.hidden{display:none!important}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer}
a{color:var(--blu);text-decoration:none}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:2rem;width:100%;max-width:360px}
.login-card h1{font-size:20px;font-weight:500;margin-bottom:0.25rem}
.login-card p{font-size:13px;color:var(--tx2);margin-bottom:1.5rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx)}
.field textarea{resize:vertical}
.btn-primary{width:100%;padding:11px;background:var(--tx);color:var(--bg);border:none;border-radius:var(--r);font-size:14px;font-weight:500}
.btn-primary:active{opacity:0.8}
.btn-sm{padding:7px 12px;background:transparent;color:var(--tx);border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-sm:active{background:var(--bg2)}
.btn-danger{padding:7px 12px;background:transparent;color:var(--red);border:0.5px solid var(--redbr);border-radius:var(--r);font-size:13px;cursor:pointer}
.error-msg{color:var(--red);font-size:12px;margin-top:6px}
#main-layout{display:flex;min-height:100vh}
#sidebar{width:210px;background:var(--bg);border-right:0.5px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20;transition:transform 0.25s}
#content{margin-left:210px;flex:1;padding:1.25rem;min-height:100vh;padding-bottom:5rem}
@media(max-width:700px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #content{margin-left:0;padding:0.75rem;padding-bottom:6rem}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}
  .mhide{display:none!important}
  #mheader{display:flex!important}
  #fab{display:flex!important}
  .form-grid{grid-template-columns:1fr!important}
  .modal{padding:1rem!important}
}
#mheader{display:none;align-items:center;justify-content:space-between;padding:12px 1rem;background:var(--bg);border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:15}
#mheader h2{font-size:15px;font-weight:500}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:15}
#sidebar-overlay.open{display:block}
#fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;width:52px;height:52px;background:var(--tx);color:var(--bg);border:none;border-radius:50%;font-size:24px;align-items:center;justify-content:center;z-index:30;cursor:pointer}
.sidebar-header{padding:1.25rem 1rem;border-bottom:0.5px solid var(--bd)}
.sidebar-header h2{font-size:15px;font-weight:500}
.sidebar-header p{font-size:11px;color:var(--tx2);margin-top:2px}
.sidebar-nav{flex:1;padding:0.5rem 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 1rem;font-size:13px;color:var(--tx2);cursor:pointer;border-left:2px solid transparent}
.nav-item:hover,.nav-item:active{background:var(--bg2);color:var(--tx)}
.nav-item.active{color:var(--tx);border-left-color:var(--tx);background:var(--bg2);font-weight:500}
.nav-item i{font-size:17px}
.sidebar-footer{padding:1rem;border-top:0.5px solid var(--bd)}
.user-info{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blubg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--blu);flex-shrink:0}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.page-header h1{font-size:18px;font-weight:500}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:0.875rem}
.stat-label{font-size:11px;color:var(--tx2);margin-bottom:4px}
.stat-value{font-size:20px;font-weight:500}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-active{background:var(--grnbg);color:var(--grn)}
.b-negotiating{background:var(--ambbg);color:var(--amb)}
.b-consulting{background:var(--blubg);color:var(--blu)}
.b-ended{background:#f1efe8;color:#5f5e5a}
.b-lost{background:var(--redbg);color:var(--red)}
.b-regular{background:var(--blubg);color:var(--blu)}
.b-spot{background:var(--ambbg);color:var(--amb)}
.b-delivery{background:var(--tealbg);color:var(--teal)}
.b-admin{background:var(--redbg);color:var(--red)}
.b-director{background:var(--purbg);color:var(--pur)}
.b-editor{background:var(--blubg);color:var(--blu)}
.sbtns{display:flex;flex-wrap:wrap;gap:4px}
.sbtn{padding:6px 10px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid var(--bd2);cursor:pointer;background:var(--bg2);color:var(--tx2);min-height:32px}
.sbtn:active{opacity:0.7}
.sbtn.s-material_submitted{background:var(--ambbg);color:var(--amb);border-color:var(--ambbr)}
.sbtn.s-editing{background:var(--blubg);color:var(--blu);border-color:var(--blubr)}
.sbtn.s-submitted_to_client{background:var(--purbg);color:var(--pur);border-color:var(--purbr)}
.sbtn.s-posted{background:var(--grnbg);color:var(--grn);border-color:var(--grnbr)}
.sbtn.s-delivered{background:var(--tealbg);color:var(--teal);border-color:var(--tealbr)}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:701px){.modal-overlay{align-items:center;padding:1rem}}
.modal{background:var(--bg);border-radius:var(--rl) var(--rl) 0 0;padding:1.5rem;width:100%;max-width:540px;max-height:92vh;overflow-y:auto}
@media(min-width:701px){.modal{border-radius:var(--rl)}}
.modal h2{font-size:16px;font-weight:500;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--bd)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.cal-nav button{background:none;border:0.5px solid var(--bd2);border-radius:var(--r);padding:6px 10px;cursor:pointer;color:var(--tx);font-size:13px}
.cal-nav button:hover{background:var(--bg2)}
.cal-title{font-size:16px;font-weight:500;flex:1}
.cal-view-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap}
.cal-tab{padding:6px 12px;border-radius:20px;font-size:12px;border:0.5px solid var(--bd2);cursor:pointer;background:var(--bg);color:var(--tx2)}
.cal-tab.active{background:var(--tx);color:var(--bg);border-color:var(--tx)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bd);border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden}
.cal-day-header{background:var(--bg2);text-align:center;padding:6px 2px;font-size:11px;font-weight:500;color:var(--tx2)}
.cal-day-header.sun{color:var(--red)}
.cal-day-header.sat{color:var(--blu)}
.cal-cell{background:var(--bg);min-height:80px;padding:4px;cursor:pointer;vertical-align:top}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.other-month{background:#f9f9f7}
.cal-cell.today .cal-day-num{background:var(--tx);color:var(--bg);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day-num{font-size:12px;font-weight:500;margin-bottom:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.cal-day-num.sun{color:var(--red)}
.cal-day-num.sat{color:var(--blu)}
.cal-event{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;line-height:1.4}
.ev-green{background:#c6e6a8;color:#2d5a0a}
.ev-blue{background:#b5d4f4;color:#0c447c}
.ev-orange{background:#fac775;color:#633806}
.ev-red{background:#f7c1c1;color:#791f1f}
.ev-teal{background:#9fe1cb;color:#085041}
.alert{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:var(--r);margin-bottom:8px;font-size:13px}
.alert-warn{background:var(--ambbg);color:var(--amb);border:0.5px solid var(--ambbr)}
.alert-info{background:var(--blubg);color:var(--blu);border:0.5px solid var(--blubr)}
.alert-ok{background:var(--grnbg);color:var(--grn);border:0.5px solid var(--grnbr)}
.alert i{font-size:15px;flex-shrink:0;margin-top:1px}
.section-title{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px;margin-top:1rem}
.empty{text-align:center;padding:2rem;color:var(--tx2);font-size:13px}
.lbtn{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;border-radius:var(--r);font-size:11px;background:var(--bg2);color:var(--tx2);border:0.5px solid var(--bd);text-decoration:none}
.lbtn:hover{background:var(--bg3)}
.prospect-group{margin-bottom:1.5rem}
.prospect-group-title{font-size:13px;font-weight:500;color:var(--tx2);padding:6px 0;border-bottom:0.5px solid var(--bd);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.prospect-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);margin-bottom:4px;cursor:pointer}
.prospect-row:hover{background:var(--bg2)}
.prospect-name{font-weight:500;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prospect-meta{font-size:11px;color:var(--tx2);white-space:nowrap}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{text-align:left;font-size:11px;font-weight:500;color:var(--tx2);padding:8px 10px;border-bottom:0.5px solid var(--bd)}
td{padding:10px;border-bottom:0.5px solid var(--bd);font-size:13px;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
</style>
</head>

function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-password').value;
  let user;
  if(email==='1'&&pw==='1'){user=db.users.find(u=>u.role==='admin'&&u.isActive);}
  else{user=db.users.find(u=>u.email===email&&u.password===pw&&u.isActive);}
  if(!user){const el=document.getElementById('login-error');el.textContent='メールアドレスまたはパスワードが違います';el.classList.remove('hidden');return;}
  state.currentUser=user;
  document.getElementById('login-screen').classList.add('hidden');

}

function getUser(id){return db.users.find(u=>u.id===id)||null;}
function getClient(id){return db.clients.find(c=>c.id===id)||null;}
function visibleVideos(){if(isAdmin()||isDirector())return db.videos;return db.videos.filter(v=>v.editorId===state.currentUser.id);}
function getDaysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function fmtDate(d){if(!d)return'-';const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;}
function toDateStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
const SM={material_submitted:'素材提出済',editing:'編集中',submitted_to_client:'お客様提出済',posted:'投稿済',delivered:'納品完了'};

function statusBtns(videoId,cur,client){return getStatusOpts(client).map(s=>`<button class="sbtn ${cur===s?'s-'+s:''}" onclick="updateVideoStatus('${videoId}','${s}')">${SM[s]}</button>`).join('');}
function getVideoColor(video){
  const s=video.status;
  if(s==='posted'||s==='delivered')return'ev-green';
  const refDate=state.calView==='edit'?video.editDueDate:state.calView==='submit'?video.clientSubmitDate:video.postDate;
  const days=getDaysUntil(refDate);
  if(days===null)return'ev-blue';
  if(days<0)return'ev-red';
  if(days<=2)return'ev-orange';
  return'ev-blue';
}
function getViewDate(video){if(state.calView==='edit')return video.editDueDate;if(state.calView==='submit')return video.clientSubmitDate;return video.postDate;}
function getAlerts(){
  const alerts=[];
  visibleVideos().filter(v=>v.status!=='posted'&&v.status!=='delivered').forEach(v=>{
    const c=getClient(v.clientId);const cn=c?c.name:'不明';
    const ed=getDaysUntil(v.editDueDate);const sd=getDaysUntil(v.clientSubmitDate);const pd=getDaysUntil(v.postDate);
    if((isAdmin()||isEditor())&&ed!==null&&ed>=0&&ed<=2&&v.status==='material_submitted')alerts.push({type:'warn',msg:`【編集リマインド】${cn} No.${v.videoNo} — 編集完了まであと${ed}日（${fmtDate(v.editDueDate)}）`});
    if((isAdmin()||isDirector())&&sd!==null&&sd>=0&&sd<=1&&v.status==='editing')alerts.push({type:'warn',msg:`【提出リマインド】${cn} No.${v.videoNo} — お客様提出まであと${sd}日（${fmtDate(v.clientSubmitDate)}）`});
    if((isAdmin()||isDirector())&&pd!==null&&pd===0&&v.status==='submitted_to_client')alerts.push({type:'info',msg:`【本日投稿】${cn} No.${v.videoNo} — 本日が投稿日です`});
  });
  return alerts;
}

function renderCalendar(){
  const y=state.calYear;const m=state.calMonth;
  const firstDay=new Date(y,m,1);const lastDay=new Date(y,m+1,0);
  const startDow=firstDay.getDay();const daysInMonth=lastDay.getDate();
  const prevLastDay=new Date(y,m,0).getDate();
  const viewTabs=isAdmin()?`<button class="cal-tab ${state.calView==='post'?'active':''}" onclick="setCalView('post')">投稿日</button><button class="cal-tab ${state.calView==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button><button class="cal-tab ${state.calView==='edit'?'active':''}" onclick="setCalView('edit')">編集完了日</button>`:isDirector()?`<button class="cal-tab ${state.calView==='post'?'active':''}" onclick="setCalView('post')">投稿日</button><button class="cal-tab ${state.calView==='submit'?'active':''}" onclick="setCalView('submit')">お客様提出日</button>`:'';
  const videos=visibleVideos();
  const videosByDate={};
  videos.forEach(v=>{const d=getViewDate(v);if(!d)return;if(!videosByDate[d])videosByDate[d]=[];videosByDate[d].push(v);});
  const headers=['日','月','火','水','木','金','土'].map((d,i)=>`<div class="cal-day-header ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  let cells='';
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let day,month,year,isOther=false;
    if(i<startDow){day=prevLastDay-startDow+i+1;month=m-1;year=y;isOther=true;}
    else if(i>=startDow+daysInMonth){day=i-startDow-daysInMonth+1;month=m+1;year=y;isOther=true;}
    else{day=i-startDow+1;month=m;year=y;}
    const dateStr=toDateStr(year,month,day);
    const todayStr=new Date().toISOString().split('T')[0];
    const isToday=dateStr===todayStr;
    const dow=new Date(year,month,day).getDay();
    const dayVids=(videosByDate[dateStr]||[]).slice(0,3);
    const eventsHtml=dayVids.map(v=>{const c=getClient(v.clientId);const col=getVideoColor(v);return`<div class="cal-event ${col}" onclick="showVideoDetail('${v.id}');event.stopPropagation()">${c?.name||'?'} No.${v.videoNo}</div>`;}).join('');
    const moreCount=(videosByDate[dateStr]||[]).length;
    const more=moreCount>3?`<div style="font-size:10px;color:var(--tx2)">+${moreCount-3}件</div>`:'';
    cells+=`<div class="cal-cell${isOther?' other-month':''}${isToday?' today':''}" onclick="showDayModal('${dateStr}')"><div class="cal-day-num${dow===0?' sun':dow===6?' sat':''}">${day}</div>${eventsHtml}${more}</div>`;
  }
  const addBtn=isAdmin()||isDirector()?`<button class="btn-sm" onclick="showAddVideoModal()"><i class="ti ti-plus" aria-hidden="true"></i>動画追加</button>`:'';
  return`<div class="page-header"><h1>カレンダー</h1>${addBtn}</div>
  <div class="cal-nav">
    <button onclick="prevMonth()"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
    <div class="cal-title">${y}年 ${MONTH_NAMES[m]}</div>
    <button onclick="nextMonth()"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    <button onclick="goToday()" style="font-size:12px">今月</button>
  </div>
  ${viewTabs?`<div class="cal-view-tabs">${viewTabs}</div>`:''}
  <div style="font-size:11px;color:var(--tx2);margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap">
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c6e6a8;margin-right:3px;vertical-align:middle"></span>投稿済・納品完了</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#b5d4f4;margin-right:3px;vertical-align:middle"></span>順調</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#fac775;margin-right:3px;vertical-align:middle"></span>期限2日以内</span>
    <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f7c1c1;margin-right:3px;vertical-align:middle"></span>期限超過</span>
  </div>
  <div class="cal-grid">${headers}${cells}</div>`;
}

function generateSchedule(startDate,postDaysOfWeek,count){
  const dm={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};
  const td=postDaysOfWeek.map(d=>dm[d]).filter(d=>d!==undefined);
  if(!td.length)return[];
  const result=[];const cur=new Date(startDate||new Date());cur.setHours(0,0,0,0);
  while(result.length<count){if(td.includes(cur.getDay())){const p=new Date(cur);const cs=new Date(cur);cs.setDate(cs.getDate()-2);const ed=new Date(cur);ed.setDate(ed.getDate()-4);const sh=new Date(cur);sh.setDate(sh.getDate()-7);result.push({postDate:p.toISOString().split('T')[0],clientSubmitDate:cs.toISOString().split('T')[0],editDueDate:ed.toISOString().split('T')[0],shootDate:sh.toISOString().split('T')[0]});}cur.setDate(cur.getDate()+1);}
  return result;
}

      <div class="full field"><label>クライアント</label><select id="nv-client">${copts}</select></div>
      <div class="field"><label>動画No.</label><input type="number" id="nv-no" min="1"></div>
      <div class="field"><label>ステータス</label><select id="nv-status"><option value="material_submitted">素材提出済</option><option value="editing">編集中</option><option value="submitted_to_client">お客様提出済</option><option value="posted">投稿済</option><option value="delivered">納品完了</option></select></div>
      <div class="field"><label>編集完了日</label><input type="date" id="nv-edit"></div>
      <div class="field"><label>お客様提出日</label><input type="date" id="nv-submit"></div>
      <div class="field"><label>投稿日</label><input type="date" id="nv-post"></div>
      <div class="field"><label>撮影・素材提出日</label><input type="date" id="nv-shoot"></div>
      <div class="full field"><label>編集担当</label><select id="nv-editor"><option value="">-</option>${eopts}</select></div>
    </div>
    <div class="modal-footer"><button class="btn-sm" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:9px 20px" onclick="saveNewVideo()">追加する</button></div>
  </div>`);
}
function saveNewVideo(){
  const clientId=document.getElementById('nv-client').value;const no=parseInt(document.getElementById('nv-no').value);
  if(!clientId||!no){alert('クライアントと動画No.を入力してください');return;}
  db.videos.push({id:genId(),clientId,videoNo:no,status:document.getElementById('nv-status').value,shootDate:document.getElementById('nv-shoot').value,editDueDate:document.getElementById('nv-edit').value,clientSubmitDate:document.getElementById('nv-submit').value,postDate:document.getElementById('nv-post').value,editorId:document.getElementById('nv-editor').value,memo:''});
  saveDB();closeModal();navigate('calendar');
}
function showAddMemberModal(){
  showModal(`<div class="modal"><h2>メンバー追加</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="nm-name" placeholder="山田 太郎"></div>
      <div class="field"><label>権限</label><select id="nm-role"><option value="editor">編集者</option><option value="director">ディレクター</option><option value="admin">経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="nm-email"></div>
      <div class="full field"><label>パスワード</label><input type="password" id="nm-pass"></div>
    </div>
    <div class="modal-footer"><button class="btn-sm" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:9px 20px" onclick="saveNewMember()">追加する</button></div>
  </div>`);
}
function saveNewMember(){
  const name=document.getElementById('nm-name').value.trim();const email=document.getElementById('nm-email').value.trim();const pass=document.getElementById('nm-pass').value;
  if(!name||!email||!pass){alert('すべての項目を入力してください');return;}
  if(db.users.find(u=>u.email===email)){alert('このメールアドレスは既に使用されています');return;}
  db.users.push({id:genId(),name,email,password:pass,role:document.getElementById('nm-role').value,isActive:true});
  saveDB();closeModal();navigate('members');
}
function showEditMemberModal(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  showModal(`<div class="modal"><h2>${u.name} の編集</h2>
    <div class="form-grid">
      <div class="field"><label>名前</label><input id="em-name" value="${u.name}"></div>
      <div class="field"><label>権限</label><select id="em-role"><option value="editor" ${u.role==='editor'?'selected':''}>編集者</option><option value="director" ${u.role==='director'?'selected':''}>ディレクター</option><option value="admin" ${u.role==='admin'?'selected':''}>経営層</option></select></div>
      <div class="full field"><label>メールアドレス</label><input type="email" id="em-email" value="${u.email}"></div>
      <div class="full field"><label>新しいパスワード（変更する場合のみ）</label><input type="password" id="em-pass"></div>
    </div>
    <div class="modal-footer"><button class="btn-sm" onclick="closeModal()">キャンセル</button><button class="btn-primary" style="width:auto;padding:9px 20px" onclick="saveEditMember('${userId}')">保存する</button></div>
  </div>`);
}
function saveEditMember(userId){
  const u=db.users.find(x=>x.id===userId);if(!u)return;
  u.name=document.getElementById('em-name').value.trim()||u.name;
  u.email=document.getElementById('em-email').value.trim()||u.email;
  u.role=document.getElementById('em-role').value;
  const np=document.getElementById('em-pass').value;if(np)u.password=np;
  saveDB();closeModal();navigate('members');
}
loadDB();updateLayout();
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
